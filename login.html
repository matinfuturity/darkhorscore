<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;color:#111}
.header{background:#111;color:white;padding:30px 20px;text-align:center}
.logo{font-size:30px;font-weight:900}
.sub{font-size:13px;color:#ccc;margin-top:6px}
.container{padding:18px}
.card{background:white;border-radius:22px;padding:20px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
label{font-weight:900;display:block;margin-top:16px}
input{width:100%;box-sizing:border-box;padding:14px;border-radius:12px;border:1px solid #ddd;font-size:16px;margin-top:8px}
button{width:100%;margin-top:18px;padding:16px;border:none;border-radius:999px;background:#111;color:white;font-size:16px;font-weight:900}
.reset-btn{background:#eee;color:#111;margin-top:10px}
.note{font-size:13px;color:#666;line-height:1.7;margin-top:16px}
.back{display:block;text-align:center;margin-top:20px;color:#666;text-decoration:none}
</style>
</head>
<body>

<div class="header">
  <div class="logo">DARKHORSCORE</div>
  <div class="sub">予想実績で評価される競馬SNS</div>
</div>

<div class="container">
  <div class="card">
    <label>表示名</label>
    <input id="username" placeholder="例：ようよう">

    <label>メールアドレス</label>
    <input id="email" type="email" placeholder="example@gmail.com">

    <label>パスワード</label>
    <input id="password" type="password" placeholder="6文字以上">

    <label>パスワード（確認）</label>
    <input id="passwordConfirm" type="password" placeholder="パスワードを再入力">

    <button onclick="signup()">新規登録</button>
    <button onclick="login()">ログイン</button>
    <button class="reset-btn" onclick="resetPassword()">パスワードを忘れた方</button>

    <div class="note">
      新規登録後、認証メールが送信されます。<br>
      メール内のリンクを開いてからログインしてください。<br><br>
      パスワード再設定を行う場合は、メールアドレスを入力してから「パスワードを忘れた方」を押してください。
    </div>
  </div>

  <a class="back" href="index.html">← ホームへ戻る</a>
</div>

<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function signup(){
  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const passwordConfirm = document.getElementById("passwordConfirm").value;

  if(!username){
    alert("表示名をご入力ください。");
    return;
  }

  if(!email){
    alert("メールアドレスをご入力ください。");
    return;
  }

  if(!password){
    alert("パスワードをご入力ください。");
    return;
  }

  if(password !== passwordConfirm){
    alert("パスワードが一致しません。");
    return;
  }

  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if(error){
    if(error.message.includes("already registered")){
      alert("このメールアドレスは既に登録されています。");
    }else{
      alert(error.message);
    }
    return;
  }

  const { error: userError } = await supabaseClient
    .from("users")
    .insert({
      id: data.user.id,
      username: username,
      email: email
    });

  if(userError){
    if(userError.message.includes("users_email_key")){
      alert("このメールアドレスは既に登録されています。");
    }else if(userError.message.includes("users_username_key")){
      alert("この表示名は既に使用されています。");
    }else{
      alert(userError.message);
    }
    return;
  }

  alert("確認メールを送信しました。メールをご確認ください。");
}

async function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!email){
    alert("メールアドレスをご入力ください。");
    return;
  }

  if(!password){
    alert("パスワードをご入力ください。");
    return;
  }

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert("メールアドレスまたはパスワードが正しくありません。");
  }else{
    alert("ログインに成功しました。");
    location.href = "index.html";
  }
}

async function resetPassword(){
  const email = document.getElementById("email").value.trim();

  if(!email){
    alert("メールアドレスをご入力ください。");
    return;
  }

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: "https://matinfuturity.github.io/darkhorscore/reset.html"
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("パスワード再設定メールを送信しました。メールをご確認ください。");
}
</script>

</body>
</html>
