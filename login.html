<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;color:#111}
.header{background:#111;color:white;padding:28px 20px;text-align:center}
.logo{font-size:30px;font-weight:900}
.sub{font-size:13px;color:#ccc;margin-top:6px}
.container{padding:18px}
.card{background:white;border-radius:22px;padding:20px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
label{font-weight:900;display:block;margin-top:16px}
input{width:100%;box-sizing:border-box;padding:14px;border-radius:12px;border:1px solid #ddd;font-size:16px;margin-top:8px}
button{width:100%;margin-top:18px;padding:16px;border:none;border-radius:999px;background:#111;color:white;font-size:16px;font-weight:900}
.note{font-size:13px;color:#666;line-height:1.7;margin-top:16px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">DARKHORSCORE</div>
  <div class="sub">ログイン / 新規登録</div>
</div>

<div class="container">
  <div class="card">
    <label>メールアドレス</label>
    <input id="email" type="email" placeholder="example@gmail.com">

    <label>パスワード</label>
    <input id="password" type="password" placeholder="6文字以上">

    <button onclick="signup()">新規登録</button>
    <button onclick="login()">ログイン</button>

    <div class="note">
      新規登録後、メール認証リンクを開いてからログインしてください。
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co/rest/v1/";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if(error){
    alert(error.message);
  }else{
    alert("確認メールを送った！メールを開いて認証して！");
  }
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert(error.message);
  }else{
    alert("ログイン成功！");
    location.href = "index.html";
  }
}
</script>

</body>
</html>
