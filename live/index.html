  0%{filter:brightness(1)}

</style>
</head>
<body>
<div class="stage">
  <div class="wall"></div>
  <div class="desk"><div class="wood"></div></div>
  <div class="poster"></div>
  <div class="lamp"><div class="pole"></div></div>
  <div class="plant"></div>
  <div class="mug"></div>
  <div class="keyboard"></div>
  <div class="mouse"></div>
  <main class="monitor">
    <section class="screen" id="screen">
      <div class="board">
        <div class="brand">DARKHORSCORE <b>LIVE</b></div>
        <div class="times">
          <div>発走 <span id="start">15:30</span></div>
          <div class="deadline">締切 <span id="deadline">15:28</span></div>
        </div>
        <div class="race-row">
          <div class="date" id="date">6月30日(月)</div>
          <div class="race" id="race">名古屋 11R</div>
          <div class="race-name" id="raceName">テストレース</div>
        </div>
        <div class="topline"></div>
        <div class="picks">
          <div class="pick">
            <div class="pick-title safe">SAFE AI</div>
            <div class="mark">◎<span id="safeNo">5</span></div>
            <div class="horse" id="safeHorse">サンライズジパング</div>
            <div class="sub safe" id="safeMemo">[牡4]</div>
          </div>
          <div class="pick">
            <div class="pick-title long">LONGSHOT AI</div>
            <div class="mark">◎<span id="longNo">11</span></div>
            <div class="horse" id="longHorse">サヴァ</div>
            <div class="sub long" id="longMemo">[牡6]</div>
          </div>
          <div class="pick">
            <div class="pick-title jiyo">ジヨの◎</div>
            <div class="mark">◎<span id="jiyoNo">2</span></div>
            <div class="horse" id="jiyoHorse">テストホース</div>
            <div class="sub jiyo" id="jiyoMemo">[牡5]</div>
          </div>
        </div>
        <div class="status live" id="status">受付中</div>
        <div class="updated" id="updated">UPDATED --:--:--</div>
        <div class="memo">
          <span class="memo-title">メモ</span>
          <span class="memo-body" id="memo">・良馬場想定　・先行有利の展開　・内枠有利の傾向</span>
        </div>
      </div>
    </section>
  </main>
</div>
<script>
function fitStage(){
  const stage = document.querySelector('.stage');
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  stage.style.transform = `scale(${scale})`;
  stage.style.left = `${(window.innerWidth - 1920 * scale) / 2}px`;
  stage.style.top = `${(window.innerHeight - 1080 * scale) / 2}px`;
}
window.addEventListener('resize', fitStage);
window.addEventListener('load', fitStage);
const SHEET_API_URL = '';
const DEMO = {
  date:'6月30日(月)',
  place:'名古屋',
  race:'11R',
  raceName:'テストレース',
  start:'15:30',
  deadline:'15:28',
  safe:'5',
  safeHorse:'サンライズジパング',
  safeMemo:'[牡4]',
  longshot:'11',
  longHorse:'サヴァ',
  longMemo:'[牡6]',
  jiyo:'2',
  jiyoHorse:'テストホース',
  jiyoMemo:'[牡5]',
  memo:'・良馬場想定　・先行有利の展開　・内枠有利の傾向'
};
function $(id){
  return document.getElementById(id);
}
function normalize(raw){
  const d = Array.isArray(raw) ? raw[0] || {} : raw || {};
  return {
    date:d.date || d['日付'] || DEMO.date,
    place:d.place || d['競馬場'] || DEMO.place,
    race:d.race || d['レース'] || DEMO.race,
    raceName:d.raceName || d['レース名'] || DEMO.raceName,
    start:d.start || d['発走'] || DEMO.start,
    deadline:d.deadline || d['締切'] || DEMO.deadline,
    safe:d.safe || d['SAFE'] || DEMO.safe,
    safeHorse:d.safeHorse || d['SAFE馬名'] || d['馬名_SAFE'] || DEMO.safeHorse,
    safeMemo:d.safeMemo || d['SAFEメモ'] || DEMO.safeMemo,
    longshot:d.longshot || d['LONGSHOT'] || DEMO.longshot,
    longHorse:d.longHorse || d['LONGSHOT馬名'] || d['馬名_LONGSHOT'] || DEMO.longHorse,
    longMemo:d.longMemo || d['LONGSHOTメモ'] || DEMO.longMemo,
    jiyo:d.jiyo || d['ジヨ'] || DEMO.jiyo,
    jiyoHorse:d.jiyoHorse || d['ジヨ馬名'] || d['馬名_ジヨ'] || DEMO.jiyoHorse,
    jiyoMemo:d.jiyoMemo || d['ジヨメモ'] || DEMO.jiyoMemo,
    memo:d.memo || d['メモ'] || DEMO.memo
  };
}
function render(data){
  const d = normalize(data);
  $('date').textContent = d.date;
  $('race').textContent = `${d.place} ${d.race}`;
  $('raceName').textContent = d.raceName;
  $('start').textContent = d.start;
  $('deadline').textContent = d.deadline;
  $('safeNo').textContent = d.safe;
  $('safeHorse').textContent = d.safeHorse;
  $('safeMemo').textContent = d.safeMemo;
  $('longNo').textContent = d.longshot;
  $('longHorse').textContent = d.longHorse;
  $('longMemo').textContent = d.longMemo;
  $('jiyoNo').textContent = d.jiyo;
  $('jiyoHorse').textContent = d.jiyoHorse;
  $('jiyoMemo').textContent = d.jiyoMemo;
  $('memo').textContent = d.memo;
  $('updated').textContent = 'UPDATED ' + new Date().toLocaleTimeString('ja-JP',{hour12:false});
  $('screen').classList.remove('flash');
  void $('screen').offsetWidth;
  $('screen').classList.add('flash');
}
async function load(){
  if(!SHEET_API_URL){
    render(DEMO);
    return;
  }
  try{
    const url = SHEET_API_URL.includes('?')
      ? SHEET_API_URL + '&t=' + Date.now()
      : SHEET_API_URL + '?t=' + Date.now();
    const res = await fetch(url,{cache:'no-store'});
    const json = await res.json();
    render(json);
  }catch(e){
    render(DEMO);
  }
}
fitStage();
load();
setInterval(load,15000);
</script>
</body>
</html>
