<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DARKHORSCORE LIVE v6</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main id="stage" class="stage" aria-label="DARKHORSCORE LIVE">
    <div class="photo-bg"></div>
    <div class="warm-glow"></div>

    <section class="board" aria-label="Live board">
      <header class="race-header">
        <div class="race-main">
          <span id="date">6月22日(日)</span>
          <span id="venueRace">中京 11R</span>
          <span id="raceName">プロキオンS</span>
        </div>
        <div class="time-box">
          <div>発走 <span id="postTime">15:35</span></div>
          <div class="deadline">締切 <span id="closeTime">15:28</span></div>
        </div>
      </header>

      <div class="divider"></div>

      <section class="picks" aria-label="Predictions">
        <article class="pick pick-safe">
          <h2>SAFE AI</h2>
          <div class="color-line"></div>
          <div class="horse-no"><span>◎</span><strong id="safeNo">5</strong></div>
          <div id="safeHorse" class="horse-name">サンライズジパング</div>
        </article>

        <article class="pick pick-longshot">
          <h2>LONGSHOT AI</h2>
          <div class="color-line"></div>
          <div class="horse-no"><strong id="longNo">11</strong></div>
          <div id="longHorse" class="horse-name">サヴァ</div>
        </article>

        <article class="pick pick-jiyo">
          <h2>ジヨの◎</h2>
          <div class="color-line"></div>
          <div class="horse-no"><strong id="jiyoNo">8</strong></div>
          <div id="jiyoHorse" class="horse-name">ハギノアレグリアス</div>
        </article>
      </section>

      <section class="memo-wrap">
        <div class="memo-title">メモ</div>
        <div class="memo-line"></div>
        <p id="memo">内枠有利の傾向。⑤は安定感抜群。⑪は展開ハマれば一発。</p>
      </section>
    </section>

    <div class="status-pill" id="statusPill">LIVE</div>
    <div class="updated" id="updated">UPDATED --:--:--</div>
  </main>

  <script src="./script.js"></script>
</body>
</html>
