<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DARKHORSCORE LIVE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="desk">
    <div class="monitor">
      <div class="screen">
        <header class="header">
          <div id="date">--</div>
          <div id="race">読み込み中</div>
          <div id="raceName">--</div>
          <div class="times">
            <div>発走 <span id="start">--:--</span></div>
            <div class="close">締切 <span id="close">--:--</span></div>
          </div>
        </header>

        <div class="topline"></div>

        <section class="picks">
          <div class="pick safe">
            <h2>SAFE AI</h2>
            <div class="underline"></div>
            <div class="mark" id="safe">-</div>
            <p id="safeName">---</p>
          </div>

          <div class="divider"></div>

          <div class="pick longshot">
            <h2>LONGSHOT AI</h2>
            <div class="underline"></div>
            <div class="mark" id="longshot">-</div>
            <p id="longName">---</p>
          </div>

          <div class="divider"></div>

          <div class="pick jiyo">
            <h2>ジヨの◎</h2>
            <div class="underline"></div>
            <div class="mark" id="jiyo">-</div>
            <p id="jiyoName">---</p>
          </div>
        </section>

        <section class="memo">
          <div class="memo-title">メモ</div>
          <div class="memo-line"></div>
          <p id="memo">---</p>
        </section>
      </div>
    </div>

    <div class="keyboard"></div>
    <div class="mug">DARKHORSE</div>
    <div class="lamp"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
