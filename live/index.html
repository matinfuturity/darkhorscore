<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DARKHORSCORE LIVE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="board">
    <div class="topbar">
      <div class="live">● LIVE</div>
      <div class="clock" id="clock">--:--</div>
    </div>

    <div class="brand">DARKHORSCORE</div>

    <div class="race" id="race">読み込み中...</div>
    <div class="time" id="time"></div>

    <section class="pick safe">
      <div class="label">SAFE AI</div>
      <div class="horse" id="safe">-</div>
    </section>

    <section class="pick longshot">
      <div class="label">LONGSHOT AI</div>
      <div class="horse" id="longshot">-</div>
    </section>

    <section class="pick jiyo">
      <div class="label">ジヨ</div>
      <div class="horse" id="jiyo">-</div>
    </section>

    <div class="memo">NAGOYA KEIBA / LIVE BOARD</div>
    <div class="updated" id="updated">更新 --:--:--</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
