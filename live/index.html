<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DARKHORSCORE LIVE v4</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="stage" id="stage">
    <div class="desk"></div>
    <section class="monitor">
      <div class="bezel">
        <div class="screen">
          <article class="board" id="board">
            <header class="brand-row">
              <div>
                <p class="kicker">DARKHORSCORE</p>
                <h1>LIVE BOARD</h1>
              </div>
              <div class="live-pill"><span></span> LIVE</div>
            </header>

            <section class="race-head">
              <div class="date-box">
                <span class="label">DATE</span>
                <strong id="date">6月30日(月)</strong>
              </div>
              <div class="race-main">
                <span class="label">RACE</span>
                <strong><span id="course">名古屋</span><span id="raceNo">1R</span></strong>
                <p id="raceName">テストレース</p>
              </div>
              <div class="time-box">
                <div><span>発走</span><strong id="startTime">15:30</strong></div>
                <div><span>締切</span><strong id="closeTime">15:28</strong></div>
              </div>
            </section>

            <section class="status-line">
              <div class="status" id="statusText">受付中</div>
              <div class="updated">UPDATED <span id="updatedAt">--:--:--</span></div>
            </section>

            <section class="picks">
              <div class="pick safe">
                <div class="pick-title">SAFE</div>
                <div class="pick-sub">AI</div>
                <div class="horse-no" id="safeNo">◎5</div>
                <div class="horse-name" id="safeHorse">サンライズジパング</div>
                <p class="pick-memo" id="safeMemo">堅実候補</p>
              </div>
              <div class="pick longshot">
                <div class="pick-title">LONGSHOT</div>
                <div class="pick-sub">AI</div>
                <div class="horse-no" id="longNo">◎11</div>
                <div class="horse-name" id="longHorse">サヴァ</div>
                <p class="pick-memo" id="longMemo">穴候補</p>
              </div>
              <div class="pick jiyo">
                <div class="pick-title">ジヨ</div>
                <div class="pick-sub">MY PICK</div>
                <div class="horse-no" id="jiyoNo">◎2</div>
                <div class="horse-name" id="jiyoHorse">テストホース</div>
                <p class="pick-memo" id="jiyoMemo">本命</p>
              </div>
            </section>

            <section class="memo-area">
              <h2>MEMO</h2>
              <p id="memo">良馬場想定。先行有利。内枠の立ち回りに注意。</p>
            </section>
          </article>
        </div>
      </div>
      <div class="stand"></div>
      <div class="base"><span>DARKHORSE</span></div>
    </section>
    <div class="lamp"></div>
  </main>
  <script src="./script.js"></script>
</body>
</html>
