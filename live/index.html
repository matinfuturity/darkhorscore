<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DARKHORSCORE LIVE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage" aria-label="DARKHORSCORE LIVE">
    <img class="desk-bg" src="bg.png" alt="" />

    <section class="board" id="board">
      <header class="topline">
        <div class="brand">DARKHORSCORE <span>LIVE</span></div>
        <div class="timebox">
          <div>発走 <b id="postTime">15:30</b></div>
          <div class="deadline">締切 <b id="closeTime">15:28</b></div>
        </div>
      </header>

      <section class="race-head">
        <div id="date">6月30日(月)</div>
        <div class="main-race"><span id="course">名古屋</span> <span id="raceNo">11R</span></div>
        <div id="raceName">テストレース</div>
      </section>

      <div class="line"></div>

      <section class="picks">
        <article class="pick safe">
          <h2>SAFE AI</h2>
          <div class="marker"></div>
          <div class="number">◎<span id="safeNo">5</span></div>
          <div class="horse" id="safeHorse">サンライズジパング</div>
          <div class="sub" id="safeMemo">[ 牡4 ]</div>
        </article>

        <article class="pick longshot">
          <h2>LONGSHOT AI</h2>
          <div class="marker"></div>
          <div class="number">◎<span id="longNo">11</span></div>
          <div class="horse" id="longHorse">サヴァ</div>
          <div class="sub" id="longMemo">[ 牡6 ]</div>
        </article>

        <article class="pick jiyo">
          <h2>ジヨの◎</h2>
          <div class="marker"></div>
          <div class="number">◎<span id="jiyoNo">2</span></div>
          <div class="horse" id="jiyoHorse">テストホース</div>
          <div class="sub" id="jiyoMemo">[ 牡5 ]</div>
        </article>
      </section>

      <div class="line bottom"></div>

      <section class="memo-area">
        <div class="memo-title">メモ</div>
        <div class="memo-grid" id="memo">
          <p>・良馬場想定</p>
          <p>・⑤は安定感抜群</p>
          <p>・先行有利の展開</p>
          <p>・⑪は展開ハマれば一発</p>
          <p>・内枠有利の傾向</p>
          <p>・②は距離延長がポイント</p>
        </div>
      </section>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
