<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DARKHORSCORE LIVE</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="fit" id="fit">
    <main class="canvas">
      <div class="bg-orb orb-a"></div>
      <div class="bg-orb orb-b"></div>
      <header class="topbar">
        <div>
          <div class="brand">DARKHORSCORE</div>
          <div class="subbrand">LIVE PREDICTION BOARD</div>
        </div>
        <div class="live-pill"><span></span>LIVE</div>
      </header>

      <section class="hero">
        <div class="race-label">CURRENT RACE</div>
        <h1 id="race">名古屋 11R</h1>
      </section>

      <section class="cards">
        <article class="card safe">
          <div class="card-head"><span>SAFE AI</span><b>堅実</b></div>
          <div class="mark">◎<span id="safeNo">5</span></div>
          <div class="horse" id="safeName">サンライズジパング</div>
          <div class="stars" id="safeStar">★★★★★</div>
        </article>

        <article class="card long">
          <div class="card-head"><span>LONGSHOT</span><b>穴狙い</b></div>
          <div class="mark">◎<span id="longNo">11</span></div>
          <div class="horse" id="longName">サヴァ</div>
          <div class="stars" id="longStar">★★★☆☆</div>
        </article>

        <article class="card jiyo">
          <div class="card-head"><span>ジヨの◎</span><b>本命</b></div>
          <div class="mark">◎<span id="jiyoNo">2</span></div>
          <div class="horse" id="jiyoName">テストホース</div>
          <div class="stars" id="jiyoStar">★★★★☆</div>
        </article>
      </section>

      <section class="bottom">
        <div class="memo-box">
          <div class="label">MEMO</div>
          <p id="memo">今日は前残り・内枠重視</p>
        </div>
        <div class="stats-box">
          <div class="label">DARKHORSCORE STATS</div>
          <div class="stats-grid">
            <div><small>RECENT</small><strong id="history">○ ○ × ○ ○</strong></div>
            <div><small>ROI</small><strong id="roi">128%</strong></div>
            <div><small>PROFIT</small><strong id="profit">+214,580円</strong></div>
          </div>
        </div>
      </section>

      <footer class="footer">
        <span>Powered by DARKHORSCORE</span>
        <span id="updated">UPDATED --:--:--</span>
      </footer>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
