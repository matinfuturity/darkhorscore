
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スワイプ予想 | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --green:#1e7f4f;
  --brown:#8b5a2b;
  --cream:#f7f3ea;
  --card:#ffffff;
  --line:#e4dccf;
  --text:#171717;
  --sub:#777;
  --red:#b84432;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--cream);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  padding-bottom:80px;
}
.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  background:linear-gradient(180deg,#fbf8f1,#f7f3ea 55%,#f1eadf);
}
.header{
  padding:24px 18px 16px;
  text-align:center;
  color:white;
  background:linear-gradient(135deg,var(--green),#2f9b64 45%,var(--brown));
}
.logo{
  font-size:26px;
  font-weight:950;
}
.sub{
  margin-top:6px;
  font-size:13px;
  font-weight:800;
  color:rgba(255,255,255,.85);
}
.container{
  padding:18px;
}
.race-box{
  background:white;
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px;
  box-shadow:0 8px 22px rgba(50,35,15,.08);
  margin-bottom:18px;
}
.race-label{
  color:var(--sub);
  font-size:12px;
  font-weight:900;
}
.race-title{
  font-size:26px;
  font-weight:950;
  margin-top:6px;
}
.progress{
  color:var(--green);
  font-size:13px;
  font-weight:900;
  margin-top:10px;
}
.card{
  background:white;
  border:1px solid var(--line);
  border-radius:30px;
  min-height:360px;
  padding:26px 20px;
  box-shadow:0 18px 40px rgba(50,35,15,.14);
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
}
.horse-label{
  color:var(--sub);
  font-size:13px;
  font-weight:900;
}
.horse-name{
  font-size:36px;
  font-weight:950;
  line-height:1.25;
  margin-top:14px;
}
.card-note{
  color:#555;
  font-size:13px;
  font-weight:700;
  line-height:1.7;
  margin-top:18px;
}
.buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:18px;
}
.btn{
  border:none;
  border-radius:999px;
  padding:17px 8px;
  font-size:18px;
  font-weight:950;
}
.pass{
  background:#eee6da;
  color:#111;
}
.buy{
  background:var(--green);
  color:white;
  box-shadow:0 8px 20px rgba(30,127,79,.25);
}
.result-box{
  display:none;
}
.result-card{
  background:white;
  border:1px solid var(--line);
  border-radius:22px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 7px 18px rgba(50,35,15,.07);
}
.result-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.result-horse{
  font-size:18px;
  font-weight:950;
}
.percent{
  color:var(--green);
  font-size:22px;
  font-weight:950;
}
.bar{
  height:10px;
  background:#eee6da;
  border-radius:999px;
  overflow:hidden;
  margin-top:12px;
}
.bar-inner{
  height:100%;
  background:var(--green);
  border-radius:999px;
}
.small{
  color:var(--sub);
  font-size:12px;
  font-weight:800;
  margin-top:8px;
}
.restart{
  width:100%;
  border:none;
  border-radius:999px;
  padding:15px;
  background:#111;
  color:white;
  font-size:16px;
  font-weight:950;
  margin-top:12px;
}
.empty{
  background:white;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  color:var(--sub);
  font-weight:800;
}
.bottom-nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  background:rgba(255,255,255,.96);
  border-top:1px solid #ddd3c3;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  padding:11px 0;
}
.bottom-nav a{
  text-align:center;
  color:#888;
  text-decoration:none;
  font-size:12px;
  font-weight:950;
}
.bottom-nav a:first-child{
  color:var(--green);
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">DARKHORSCORE</div>
    <div class="sub">スワイプ予想</div>
  </div>
  <div class="container">
    <div class="race-box">
      <div class="race-label">対象レース</div>
      <div class="race-title" id="raceTitle">ラジオNIKKEI賞</div>
      <div class="progress" id="progressText">1 / 8</div>
    </div>
    <div id="swipeArea">
      <div class="card">
        <div class="horse-label">この馬、買う？消す？</div>
        <div class="horse-name" id="horseName">読み込み中...</div>
        <div class="card-note">
          右の「買う」か、左の「消す」を押すだけ。<br>
          ログイン不要で参加できます。
        </div>
      </div>
      <div class="buttons">
        <button class="btn pass" onclick="vote('pass')">❌ 消す</button>
        <button class="btn buy" onclick="vote('buy')">❤️ 買う</button>
      </div>
    </div>
    <div id="resultBox" class="result-box">
      <div class="race-box">
        <div class="race-label">結果</div>
        <div class="race-title">みんなの支持率</div>
        <div class="small">買う票の割合で表示しています。</div>
      </div>
      <div id="resultList"></div>
      <button class="restart" onclick="restart()">もう一回見る</button>
    </div>
  </div>
</div>
<div class="bottom-nav">
  <a href="index.html">ホーム</a>
  <a href="post.html">予想</a>
  <a href="mypage.html">マイページ</a>
</div>
<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const raceId = 1001;
const raceName = "ラジオNIKKEI賞";
const horses = [
  "エキサイトバイオ",
  "センツブラッド",
  "ビーオンザカバー",
  "フクノブルーレイク",
  "モティスフォント",
  "ショウナンマクベス",
  "レーヴブリリアント",
  "バズアップビート"
];
let current = 0;
let myBuyHorses = [];
let deviceId = localStorage.getItem("darkhorscore_device_id");
if(!deviceId){
  deviceId = crypto.randomUUID();
  localStorage.setItem("darkhorscore_device_id", deviceId);
}
function renderHorse(){
  document.getElementById("raceTitle").textContent = raceName;
  document.getElementById("progressText").textContent =
    (current + 1) + " / " + horses.length;
  document.getElementById("horseName").textContent = horses[current];
}
async function vote(type){
  const horse = horses[current];
  if(type === "buy"){
    myBuyHorses.push(horse);
  }
  await supabaseClient
    .from("swipes")
    .insert({
      race_id: raceId,
      race_name: raceName,
      horse: horse,
      vote: type,
      device_id: deviceId
    });
  current++;
  if(current >= horses.length){
    showResults();
  }else{
    renderHorse();
  }
}
async function showResults(){
  document.getElementById("swipeArea").style.display = "none";
  document.getElementById("resultBox").style.display = "block";
  document.getElementById("progressText").textContent = "完了";
  const { data, error } = await supabaseClient
    .from("swipes")
    .select("*")
    .eq("race_name", raceName);
  if(error){
    document.getElementById("resultList").innerHTML =
      `<div class="empty">集計の取得に失敗しました。</div>`;
    return;
  }
  const map = {};
  horses.forEach(horse => {
    map[horse] = {
      horse: horse,
      buy: 0,
      pass: 0,
      total: 0
    };
  });
  (data || []).forEach(row => {
    if(!map[row.horse]) return;
    if(row.vote === "buy"){
      map[row.horse].buy++;
    }
    if(row.vote === "pass"){
      map[row.horse].pass++;
    }
    map[row.horse].total++;
  });
  const ranking = Object.values(map)
    .map(item => ({
      ...item,
      percent: item.total ? (item.buy / item.total) * 100 : 0
    }))
    .sort((a,b) => b.percent - a.percent || b.buy - a.buy);
  document.getElementById("resultList").innerHTML =
    ranking.map((item,index) => `
      <div class="result-card">
        <div class="result-top">
          <div class="result-horse">${index + 1}. ${item.horse}</div>
          <div class="percent">${item.percent.toFixed(1)}%</div>
        </div>
        <div class="bar">
          <div class="bar-inner" style="width:${item.percent}%"></div>
        </div>
        <div class="small">
          買う ${item.buy} / 消す ${item.pass}
        </div>
      </div>
    `).join("");
}
function restart(){
  current = 0;
  myBuyHorses = [];
  document.getElementById("resultBox").style.display = "none";
  document.getElementById("swipeArea").style.display = "block";
  renderHorse();
}
renderHorse();
</script>
</body>
</html>
