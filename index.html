<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>DARKHORSCORE</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:#f7f7f7;color:#111}
.header{background:white;padding:18px 20px;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10}
.logo{font-size:24px;font-weight:900;letter-spacing:-1px;text-align:center}
.sub{text-align:center;color:#666;font-size:13px;margin-top:4px}
.tabs,.courses{display:grid;gap:10px;padding:16px 18px;background:white}
.tabs{grid-template-columns:1fr 1fr}
.courses{grid-template-columns:1fr 1fr 1fr}
.tab,.course{padding:13px;border:2px solid #111;border-radius:10px;text-align:center;font-weight:800;background:white}
.active{background:#111;color:white}
.section{padding:22px 18px}
h2{text-align:center;margin:16px 0 22px;font-size:24px}
.race{background:white;border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 8px 22px rgba(0,0,0,.06);border:1px solid #eee}
.race-top{display:flex;justify-content:space-between;align-items:center}
.rno{font-size:14px;color:#777;font-weight:800}
.grade{font-size:13px;font-weight:900;background:#111;color:white;padding:5px 10px;border-radius:999px}
.name{font-size:23px;font-weight:900;margin-top:8px}
.info{color:#777;margin-top:6px}
.count{margin-top:12px;font-size:14px;color:#444}
.buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.btn{display:block;text-align:center;padding:13px;border-radius:999px;font-weight:900;text-decoration:none}
.black{background:#111;color:white}
.white{background:white;color:#111;border:1px solid #111}
.note{background:#111;color:white;border-radius:22px;padding:20px;margin:8px 18px 22px;line-height:1.7}
.nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #ddd;display:grid;grid-template-columns:repeat(4,1fr);padding:10px 0}
.nav a{text-align:center;color:#111;text-decoration:none;font-size:12px;font-weight:800}
.footer-space{height:80px}
</style>
</head>
