　<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#050505;
  --card:#121212;
  --line:#242424;
  --gold:#d4af37;
  --text:#fff;
  --sub:#999;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  padding-bottom:70px;
}

a{
  color:inherit;
  text-decoration:none;
}

.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  padding:26px 18px;
  background:
    radial-gradient(circle at top right, rgba(212,175,55,.16), transparent 38%),
    linear-gradient(180deg,#070707 0%,#050505 100%);
}

.header{
  padding:14px 0 34px;
}

.logo{
  font-size:24px;
  font-weight:950;
  letter-spacing:1.5px;
  color:var(--gold);
}

.catch{
  margin-top:10px;
  color:var(--sub);
  font-size:14px;
  line-height:1.7;
  font-weight:700;
}

.section-title{
  font-size:20px;
  font-weight:950;
  margin-bottom:14px;
}

.race-card{
  background:rgba(255,255,255,.045);
  border:1px solid var(--line);
  border-radius:22px;
  padding:18px;
  margin-bottom:12px;
}

.race-title{
  font-size:18px;
  font-weight:950;
  line-height:1.4;
}

.deadline{
  color:var(--sub);
  font-size:12px;
  margin-top:9px;
  font-weight:700;
}

.vote-count{
  color:var(--gold);
  font-size:13px;
  margin-top:9px;
  font-weight:950;
}

.empty{
  color:var(--sub);
  font-size:14px;
  line-height:1.7;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  background:rgba(5,5,5,.94);
  backdrop-filter:blur(14px);
  border-top:1px solid #222;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  padding:12px 0;
  z-index:999;
}

.bottom-nav a{
  text-align:center;
  color:#777;
  font-size:12px;
  font-weight:950;
}

.bottom-nav a:first-child{
  color:var(--gold);
}
</style>
</head>

<body>
<div class="app">

  <div class="header">
    <div class="logo">DARKHORSCORE</div>
    <div class="catch">
      みんなはどの馬を買う？<br>
      レースごとの人気馬をチェック。
    </div>
  </div>

  <div class="section-title">対象レース</div>

  <div id="raceBox">
    <div class="race-card empty">読み込み中...</div>
  </div>

</div>

<div class="bottom-nav">
  <a href="index.html">ホーム</a>
  <a href="post.html">投票</a>
  <a href="legal.html">規約</a>
</div>

<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let races = [];
let picks = [];

async function loadData(){
  const raceRes = await supabaseClient
    .from("races")
    .select("*")
    .order("deadline", { ascending:true });

  const pickRes = await supabaseClient
    .from("picks")
    .select("*");

  races = raceRes.data || [];
  picks = pickRes.data || [];

  renderRaces();
}

function renderRaces(){
  const box = document.getElementById("raceBox");
  const now = new Date();

  const upcoming = races.filter(r => {
    return !r.deadline || new Date(r.deadline) > now;
  });

  if(upcoming.length === 0){
    box.innerHTML = `
      <div class="race-card empty">
        現在、対象レースはありません。
      </div>
    `;
    return;
  }

  box.innerHTML = upcoming.map(r => {
    const deadline = r.deadline
      ? new Date(r.deadline).toLocaleString("ja-JP")
      : "未設定";

    const count = picks.filter(p =>
      p.racecourse === r.racecourse &&
      p.race === r.race
    ).length;

    return `
      <a href="race.html?racecourse=${encodeURIComponent(r.racecourse)}&race=${encodeURIComponent(r.race)}">
        <div class="race-card">
          <div class="race-title">${r.racecourse}｜${r.race}</div>
          <div class="deadline">締切：${deadline}</div>
          <div class="vote-count">${count}票</div>
        </div>
      </a>
    `;
  }).join("");
}

loadData();
</script>
</body>
</html>
