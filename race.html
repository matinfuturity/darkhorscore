
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人気順 | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#050505;
  --card:#121212;
  --line:#242424;
  --gold:#d4af37;
  --text:#fff;
  --sub:#999;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  padding-bottom:76px;
}
a{
  color:inherit;
  text-decoration:none;
}
.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  padding:26px 18px;
  background:
    radial-gradient(circle at top right, rgba(212,175,55,.16), transparent 38%),
    linear-gradient(180deg,#070707 0%,#050505 100%);
}
.header{
  padding:14px 0 26px;
}
.logo{
  font-size:24px;
  font-weight:950;
  letter-spacing:1.5px;
  color:var(--gold);
}
.catch{
  margin-top:10px;
  color:var(--sub);
  font-size:14px;
  line-height:1.7;
  font-weight:700;
}
.hero{
  background:rgba(255,255,255,.045);
  border:1px solid var(--line);
  border-radius:24px;
  padding:20px;
  margin-bottom:20px;
}
.race-title{
  font-size:24px;
  font-weight:950;
  line-height:1.35;
}
.race-info{
  color:var(--sub);
  font-size:13px;
  margin-top:8px;
  font-weight:700;
}
.total-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:18px;
}
.total-item{
  background:#0b0b0b;
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}
.total-label{
  color:var(--sub);
  font-size:12px;
  font-weight:800;
}
.total-num{
  font-size:25px;
  font-weight:950;
  margin-top:4px;
  color:var(--gold);
}
.action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:16px;
}
.btn{
  display:block;
  text-align:center;
  padding:14px;
  border-radius:999px;
  font-weight:950;
  font-size:13px;
}
.btn-primary{
  background:var(--gold);
  color:#050505;
}
.btn-secondary{
  background:#222;
  color:#fff;
}
.section-title{
  margin:22px 0 12px;
  font-size:19px;
  font-weight:950;
}
.rank-card{
  background:rgba(255,255,255,.045);
  border:1px solid var(--line);
  border-radius:20px;
  padding:16px;
  margin-bottom:12px;
}
.rank-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
.rank-left{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}
.rank-num{
  width:32px;
  height:32px;
  border-radius:50%;
  background:var(--gold);
  color:#050505;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:950;
  flex-shrink:0;
}
.horse-name{
  font-size:18px;
  font-weight:950;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.vote-count{
  font-size:18px;
  font-weight:950;
  color:#fff;
  text-align:right;
}
.percent{
  color:var(--sub);
  font-size:12px;
  font-weight:800;
  text-align:right;
  margin-top:2px;
}
.bar-bg{
  height:8px;
  background:#222;
  border-radius:999px;
  overflow:hidden;
  margin-top:13px;
}
.bar{
  height:100%;
  background:var(--gold);
  border-radius:999px;
}
.empty{
  background:rgba(255,255,255,.045);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  color:var(--sub);
  font-size:14px;
  line-height:1.7;
  font-weight:700;
}
.error{
  color:#ffb3b3;
  background:rgba(255,0,0,.08);
  border:1px solid rgba(255,0,0,.22);
  padding:12px;
  border-radius:14px;
  margin-bottom:12px;
  display:none;
  font-size:13px;
}
.bottom-nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  background:rgba(5,5,5,.94);
  backdrop-filter:blur(14px);
  border-top:1px solid #222;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  padding:12px 0;
  z-index:999;
}
.bottom-nav a{
  text-align:center;
  color:#777;
  font-size:12px;
  font-weight:950;
}
.bottom-nav a:first-child{
  color:var(--gold);
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">DARKHORSCORE</div>
    <div class="catch">みんなが買う馬をチェック。</div>
  </div>
  <div id="errorBox" class="error"></div>
  <div class="hero">
    <div id="raceTitle" class="race-title">読み込み中...</div>
    <div id="raceInfo" class="race-info"></div>
    <div class="total-box">
      <div class="total-item">
        <div class="total-label">総投票数</div>
        <div id="totalVotes" class="total-num">0</div>
      </div>
      <div class="total-item">
        <div class="total-label">投票馬数</div>
        <div id="horseKinds" class="total-num">0</div>
      </div>
    </div>
    <div class="action-row">
      <a id="postLink" href="post.html" class="btn btn-primary">投票する</a>
      <a href="index.html" class="btn btn-secondary">戻る</a>
    </div>
  </div>
  <div class="section-title">人気順</div>
  <div id="voteRanking"></div>
</div>
<div class="bottom-nav">
  <a href="index.html">ホーム</a>
  <a href="post.html">投票</a>
  <a href="legal.html">規約</a>
</div>
<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const params = new URLSearchParams(location.search);
const racecourse = params.get("racecourse") || "";
const race = params.get("race") || "";
function showError(message){
  const box = document.getElementById("errorBox");
  box.textContent = message;
  box.style.display = "block";
}
async function loadRacePicks(){
  if(!race){
    document.getElementById("raceTitle").textContent = "レースが指定されていません";
    document.getElementById("raceInfo").textContent = "ホームからレースを選んでください。";
    document.getElementById("voteRanking").innerHTML =
      `<div class="empty">表示できる投票がありません。</div>`;
    return;
  }
  document.getElementById("raceTitle").textContent = race;
  document.getElementById("raceInfo").textContent =
    racecourse ? `${racecourse}｜人気投票` : "人気投票";
  document.getElementById("postLink").href =
    `post.html?racecourse=${encodeURIComponent(racecourse)}&race=${encodeURIComponent(race)}`;
  let query = supabaseClient
    .from("picks")
    .select("*")
    .eq("race", race)
    .order("created_at", { ascending:false });
  if(racecourse){
    query = query.eq("racecourse", racecourse);
  }
  const { data, error } = await query;
  if(error){
    showError(error.message);
    return;
  }
  const picks = data || [];
  renderSummary(picks);
  renderVoteRanking(picks);
}
function renderSummary(picks){
  const horses = new Set(
    picks.map(p => p.horse || "未入力")
  );
  document.getElementById("totalVotes").textContent = picks.length;
  document.getElementById("horseKinds").textContent = horses.size;
}
function renderVoteRanking(picks){
  const box = document.getElementById("voteRanking");
  if(picks.length === 0){
    box.innerHTML = `<div class="empty">まだ投票がありません。</div>`;
    return;
  }
  const counts = {};
  picks.forEach(p => {
    const horse = p.horse || "未入力";
    counts[horse] = (counts[horse] || 0) + 1;
  });
  const ranking = Object.entries(counts)
    .map(([horse, count]) => ({
      horse,
      count,
      percent: picks.length ? (count / picks.length) * 100 : 0
    }))
    .sort((a,b) => b.count - a.count);
  box.innerHTML = ranking.map((item, index) => `
    <div class="rank-card">
      <div class="rank-top">
        <div class="rank-left">
          <div class="rank-num">${index + 1}</div>
          <div class="horse-name">${item.horse}</div>
        </div>
        <div>
          <div class="vote-count">${item.count}票</div>
          <div class="percent">${item.percent.toFixed(1)}%</div>
        </div>
      </div>
      <div class="bar-bg">
        <div class="bar" style="width:${item.percent}%"></div>
      </div>
    </div>
  `).join("");
}
loadRacePicks();
</script>
</body>
</html>

これでrace.htmlは人気順だけ表示になる。
