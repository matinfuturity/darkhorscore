
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予想家比較 | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --green:#1e7f4f;
  --brown:#8b5a2b;
  --cream:#f7f3ea;
  --card:#ffffff;
  --line:#e4dccf;
  --text:#171717;
  --sub:#777;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--cream);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  padding-bottom:90px;
}
.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  background:linear-gradient(180deg,#fbf8f1,#f7f3ea 55%,#f1eadf);
}
.header{
  padding:28px 18px 22px;
  text-align:center;
  color:white;
  background:linear-gradient(135deg,var(--green),#2f9b64 45%,var(--brown));
}
.logo{
  font-size:28px;
  font-weight:950;
}
.sub{
  margin-top:6px;
  font-size:13px;
  font-weight:800;
  color:rgba(255,255,255,.85);
}
.container{
  padding:16px;
}
.hero{
  background:white;
  border:1px solid var(--line);
  border-radius:24px;
  padding:20px;
  box-shadow:0 8px 22px rgba(50,35,15,.08);
  margin-bottom:18px;
}
.hero-title{
  font-size:26px;
  font-weight:950;
}
.hero-sub{
  color:var(--sub);
  margin-top:8px;
  font-size:13px;
  line-height:1.6;
  font-weight:700;
}
.section-title{
  margin:22px 0 10px;
  font-size:18px;
  font-weight:950;
}
.table-wrap{
  overflow-x:auto;
  background:white;
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:0 8px 22px rgba(50,35,15,.08);
  margin-bottom:18px;
}
.compare-table{
  width:720px;
  border-collapse:collapse;
  font-size:13px;
}
.compare-table th{
  background:#f7f3ea;
  color:#555;
  text-align:left;
  padding:12px 10px;
  border-bottom:1px solid var(--line);
  white-space:nowrap;
}
.compare-table td{
  padding:13px 10px;
  border-bottom:1px solid #eee6da;
  white-space:nowrap;
  font-weight:800;
}
.rank-cell{
  color:var(--brown);
  font-weight:950;
}
.name-cell{
  color:#111;
  font-weight:950;
}
.rate-cell{
  color:var(--green);
  font-size:18px;
  font-weight:950;
}
.players-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.player-card{
  background:white;
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px 10px;
  text-align:center;
  box-shadow:0 6px 16px rgba(50,35,15,.06);
}
.player-rank{
  color:var(--brown);
  font-size:12px;
  font-weight:950;
}
.player-name{
  font-size:14px;
  font-weight:950;
  margin-top:7px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.player-rate{
  color:var(--green);
  font-size:26px;
  font-weight:950;
  margin-top:7px;
}
.player-stats{
  color:var(--sub);
  margin-top:6px;
  font-size:11px;
  font-weight:800;
  line-height:1.5;
}
.empty{
  background:white;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  color:var(--sub);
  font-weight:800;
}
.bottom-nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  background:rgba(255,255,255,.96);
  border-top:1px solid #ddd3c3;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  padding:11px 0;
}
.bottom-nav a{
  text-align:center;
  text-decoration:none;
  color:#888;
  font-size:12px;
  font-weight:950;
}
.bottom-nav a:nth-child(3){
  color:var(--green);
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">DARKHORSCORE</div>
    <div class="sub">予想家比較</div>
  </div>
  <div class="container">
    <div class="hero">
      <div class="hero-title">予想家を比較する</div>
      <div class="hero-sub">
        的中率・的中数・投稿数をまとめてチェック。<br>
        横にも縦にも見比べられます。
      </div>
    </div>
    <div class="section-title">横スクロール比較</div>
    <div class="table-wrap">
      <table class="compare-table">
        <thead>
          <tr>
            <th>順位</th>
            <th>予想家</th>
            <th>的中率</th>
            <th>的中</th>
            <th>集計済み</th>
            <th>投稿数</th>
          </tr>
        </thead>
        <tbody id="playersTable">
          <tr><td colspan="6">読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="section-title">カードで見る</div>
    <div id="playersBox">
      <div class="empty">読み込み中...</div>
    </div>
  </div>
</div>
<div class="bottom-nav">
  <a href="index.html">ホーム</a>
  <a href="post.html">予想</a>
  <a href="mypage.html">マイページ</a>
</div>
<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
function getStatus(p, results){
  const sameRaceResults = results.filter(r => {
    if(p.race_id && r.race_id){
      return Number(r.race_id) === Number(p.race_id);
    }
    return r.racecourse === p.racecourse && r.race === p.race;
  });
  if(sameRaceResults.length === 0){
    return "集計待ち";
  }
  const hit = sameRaceResults.find(r =>
    r.horse === p.horse && Number(r.result) === 1
  );
  return hit ? "的中" : "不的中";
}
async function loadPlayers(){
  const playersBox = document.getElementById("playersBox");
  const playersTable = document.getElementById("playersTable");
  const { data:picks, error:pickError } = await supabaseClient
    .from("picks")
    .select("*");
  const { data:results, error:resultError } = await supabaseClient
    .from("results")
    .select("*");
  if(pickError || resultError){
    const message = pickError?.message || resultError?.message || "取得に失敗しました。";
    playersBox.innerHTML = `<div class="empty">${message}</div>`;
    playersTable.innerHTML = `<tr><td colspan="6">${message}</td></tr>`;
    return;
  }
  if(!picks || picks.length === 0){
    playersBox.innerHTML = `<div class="empty">まだ予想家がいません。</div>`;
    playersTable.innerHTML = `<tr><td colspan="6">まだ予想家がいません。</td></tr>`;
    return;
  }
  const users = {};
  picks.forEach(pick => {
    const username = pick.username || "名無しの予想家";
    if(!users[username]){
      users[username] = {
        username,
        postTotal:0,
        judgedTotal:0,
        hit:0
      };
    }
    users[username].postTotal++;
    const status = getStatus(pick, results || []);
    if(status !== "集計待ち"){
      users[username].judgedTotal++;
      if(status === "的中"){
        users[username].hit++;
      }
    }
  });
  const ranking = Object.values(users)
    .map(user => ({
      ...user,
      rate:user.judgedTotal ? (user.hit / user.judgedTotal) * 100 : 0
    }))
    .sort((a,b) =>
      b.rate - a.rate ||
      b.hit - a.hit ||
      b.judgedTotal - a.judgedTotal ||
      b.postTotal - a.postTotal
    );
  playersTable.innerHTML = ranking.map((user,index) => `
    <tr>
      <td class="rank-cell">${index + 1}位</td>
      <td class="name-cell">${user.username}</td>
      <td class="rate-cell">${user.rate.toFixed(1)}%</td>
      <td>${user.hit}</td>
      <td>${user.judgedTotal}</td>
      <td>${user.postTotal}</td>
    </tr>
  `).join("");
  playersBox.innerHTML = `
    <div class="players-grid">
      ${ranking.map((user,index) => `
        <div class="player-card">
          <div class="player-rank">${index + 1}位</div>
          <div class="player-name">${user.username}</div>
          <div class="player-rate">${user.rate.toFixed(0)}%</div>
          <div class="player-stats">
            的中 ${user.hit}/${user.judgedTotal}<br>
            投稿 ${user.postTotal}
          </div>
        </div>
      `).join("")}
    </div>
  `;
}
loadPlayers();
</script>
</body>
</html>
