
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>的中実績 | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --green:#1e7f4f;
  --brown:#8b5a2b;
  --cream:#f7f3ea;
  --card:#ffffff;
  --line:#e4dccf;
  --text:#171717;
  --sub:#777;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--cream);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  padding-bottom:90px;
}
.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  background:linear-gradient(180deg,#fbf8f1,#f7f3ea 55%,#f1eadf);
}
.header{
  padding:28px 18px 22px;
  text-align:center;
  color:white;
  background:linear-gradient(135deg,var(--green),#2f9b64 45%,var(--brown));
}
.logo{
  font-size:28px;
  font-weight:950;
}
.sub{
  margin-top:6px;
  font-size:13px;
  font-weight:800;
  color:rgba(255,255,255,.85);
}
.container{
  padding:16px;
}
.hero{
  background:white;
  border:1px solid var(--line);
  border-radius:24px;
  padding:20px;
  box-shadow:0 8px 22px rgba(50,35,15,.08);
  margin-bottom:18px;
}
.hero-title{
  font-size:26px;
  font-weight:950;
}
.hero-sub{
  color:var(--sub);
  margin-top:8px;
  font-size:13px;
  line-height:1.6;
  font-weight:700;
}
.summary{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:16px;
}
.summary-card{
  background:#f7f3ea;
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}
.summary-label{
  color:var(--sub);
  font-size:12px;
  font-weight:800;
}
.summary-num{
  color:var(--green);
  font-size:24px;
  font-weight:950;
  margin-top:4px;
}
.section-title{
  margin:22px 0 10px;
  font-size:18px;
  font-weight:950;
}
.players-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
.player-card{
  background:white;
  border:1px solid var(--line);
  border-left:5px solid var(--green);
  border-radius:22px;
  padding:16px;
  box-shadow:0 7px 18px rgba(50,35,15,.07);
}
.player-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}
.player-name{
  font-size:20px;
  font-weight:950;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.hit-count{
  background:var(--green);
  color:white;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:950;
  flex-shrink:0;
}
.favorite{
  color:var(--sub);
  font-size:12px;
  font-weight:800;
  margin-top:6px;
}
.hit-list{
  margin-top:14px;
  display:grid;
  gap:9px;
}
.hit-item{
  background:#fbfaf7;
  border:1px solid var(--line);
  border-radius:15px;
  padding:12px;
}
.hit-race{
  font-size:13px;
  color:var(--brown);
  font-weight:950;
}
.hit-horse{
  font-size:18px;
  font-weight:950;
  margin-top:5px;
}
.more-hit{
  color:var(--sub);
  font-size:12px;
  font-weight:800;
  margin-top:10px;
  text-align:right;
}
.empty{
  background:white;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  color:var(--sub);
  font-weight:800;
}
.bottom-nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  background:rgba(255,255,255,.96);
  border-top:1px solid #ddd3c3;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  padding:11px 0;
}
.bottom-nav a{
  text-align:center;
  text-decoration:none;
  color:#888;
  font-size:12px;
  font-weight:950;
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">DARKHORSCORE</div>
    <div class="sub">的中実績ギャラリー</div>
  </div>
  <div class="container">
    <div class="hero">
      <div class="hero-title">当てた予想家を見る</div>
      <div class="hero-sub">
        不的中・集計待ちは表示せず、的中した予想だけを一覧で見られます。
      </div>
      <div class="summary">
        <div class="summary-card">
          <div class="summary-label">的中予想家</div>
          <div id="userHitCount" class="summary-num">...</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">的中実績</div>
          <div id="totalHitCount" class="summary-num">...</div>
        </div>
      </div>
    </div>
    <div class="section-title">予想家の的中実績</div>
    <div id="playersBox">
      <div class="empty">読み込み中...</div>
    </div>
  </div>
</div>
<div class="bottom-nav">
  <a href="index.html">ホーム</a>
  <a href="post.html">予想</a>
  <a href="mypage.html">マイページ</a>
</div>
<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
function isHit(pick, results){
  return results.some(result => {
    const sameRace =
      pick.race_id && result.race_id
        ? Number(pick.race_id) === Number(result.race_id)
        : result.racecourse === pick.racecourse && result.race === pick.race;
    return sameRace &&
      result.horse === pick.horse &&
      Number(result.result) === 1;
  });
}
async function loadHitGallery(){
  const box = document.getElementById("playersBox");
  const { data:picks, error:pickError } = await supabaseClient
    .from("picks")
    .select("*")
    .order("created_at", { ascending:false });
  const { data:results, error:resultError } = await supabaseClient
    .from("results")
    .select("*");
  const { data:profiles } = await supabaseClient
    .from("users")
    .select("*");
  if(pickError || resultError){
    const message = pickError?.message || resultError?.message || "取得に失敗しました。";
    box.innerHTML = `<div class="empty">${message}</div>`;
    return;
  }
  const hitPicks = (picks || []).filter(p =>
    isHit(p, results || [])
  );
  if(hitPicks.length === 0){
    document.getElementById("userHitCount").textContent = "0人";
    document.getElementById("totalHitCount").textContent = "0件";
    box.innerHTML = `<div class="empty">まだ的中実績がありません。</div>`;
    return;
  }
  const profileMap = {};
  (profiles || []).forEach(profile => {
    if(profile.username){
      profileMap[profile.username] = profile;
    }
  });
  const users = {};
  hitPicks.forEach(p => {
    const username = p.username || "名無しの予想家";
    if(!users[username]){
      users[username] = {
        username,
        favorite_horse: profileMap[username]?.favorite_horse || "未設定",
        hits:[]
      };
    }
    users[username].hits.push(p);
  });
  const list = Object.values(users)
    .sort((a,b) => b.hits.length - a.hits.length);
  document.getElementById("userHitCount").textContent = list.length + "人";
  document.getElementById("totalHitCount").textContent = hitPicks.length + "件";
  box.innerHTML = `
    <div class="players-grid">
      ${list.map(user => {
        const shownHits = user.hits.slice(0,3);
        return `
          <div class="player-card">
            <div class="player-top">
              <div>
                <div class="player-name">${user.username}</div>
                <div class="favorite">好きな馬：${user.favorite_horse}</div>
              </div>
              <div class="hit-count">的中 ${user.hits.length}件</div>
            </div>
            <div class="hit-list">
              ${shownHits.map(hit => `
                <div class="hit-item">
                  <div class="hit-race">${hit.racecourse || ""}｜${hit.race || ""}</div>
                  <div class="hit-horse">◎ ${hit.horse || ""}</div>
                </div>
              `).join("")}
            </div>
            ${
              user.hits.length > 3
                ? `<div class="more-hit">ほか ${user.hits.length - 3}件の的中</div>`
                : ``
            }
          </div>
        `;
      }).join("")}
    </div>
  `;
}
loadHitGallery();
</script>
</body>
</html>
