<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ランキング | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --gold:#d4af37;
  --silver:#bfc5cd;
  --bronze:#b87333;
}

body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

.header{
  background:linear-gradient(180deg,#050505,#151515);
  padding:24px 18px;
  border-bottom:1px solid rgba(212,175,55,.25);
}

.logo{
  font-size:30px;
  font-weight:900;
  text-align:center;
}

.copy{
  text-align:center;
  color:var(--gold);
  font-size:13px;
  margin-top:6px;
}

.hero{
  margin-top:18px;
  background:linear-gradient(180deg,#1b1b1b,#111);
  border-radius:22px;
  padding:22px;
  border:1px solid rgba(212,175,55,.2);
}

.hero-title{
  font-size:28px;
  font-weight:900;
  line-height:1.4;
}

.gold{
  color:var(--gold);
}

.section{
  padding:16px;
}

.section-title{
  font-size:22px;
  font-weight:900;
  margin-bottom:14px;
}

.top-card{
  border-radius:24px;
  padding:22px;
  margin-bottom:16px;
  color:white;
}

.top1{
  background:linear-gradient(135deg,#f4d36b,#8f6a17);
}

.top2{
  background:linear-gradient(135deg,#dfe4ea,#7f8c8d);
}

.top3{
  background:linear-gradient(135deg,#d19156,#8b4513);
}

.medal{
  font-size:34px;
}

.rank-name{
  font-size:24px;
  font-weight:900;
  margin-top:10px;
}

.rate{
  font-size:56px;
  font-weight:900;
  margin-top:10px;
}

.rank-sub{
  font-size:14px;
  margin-top:10px;
}

.normal-card{
  background:linear-gradient(180deg,#1b1b1b,#111);
  border:1px solid rgba(255,255,255,.08);
  border-left:5px solid var(--gold);
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
}

.normal-rank{
  color:#aaa;
  font-size:14px;
}

.normal-name{
  font-size:18px;
  font-weight:900;
  margin-top:6px;
}

.normal-rate{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-top:6px;
}

.normal-sub{
  color:#bbb;
  font-size:13px;
  margin-top:6px;
}

.info-card{
  background:linear-gradient(180deg,#1b1b1b,#111);
  border-radius:18px;
  padding:18px;
  color:#ddd;
  line-height:1.8;
  border:1px solid rgba(255,255,255,.08);
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#070707;
  border-top:1px solid rgba(212,175,55,.25);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  padding:10px 0;
}

.bottom-nav a{
  text-align:center;
  color:#ddd;
  text-decoration:none;
  font-size:12px;
  font-weight:900;
}

.bottom-nav a:nth-child(3){
  color:var(--gold);
}

.space{
  height:90px;
}

</style>
</head>

<body>

<div class="header">

  <div class="logo">
    DARKHORSCORE
  </div>

  <div class="copy">
    予想家ランキング
  </div>

  <div class="hero">
    <div class="hero-title">
      当たる人が<br>
      <span class="gold">評価される。</span>
    </div>
  </div>

</div>

<div class="section">

  <div class="section-title">
    🏆 TOP RANKING
  </div>

  <div id="top3Box">
    読み込み中...
  </div>

  <div id="rankingBox">
    読み込み中...
  </div>

  <div class="section-title">
    DARKHORSCOREとは
  </div>

  <div class="info-card">
    人気ではなく実績で評価される競馬SNSです。<br><br>
    投稿した本命馬が1着だった場合に的中として集計しています。
  </div>

</div>

<div class="space"></div>

<div class="bottom-nav">
  <a href="index.html">ホーム</a>
  <a href="post.html">予想</a>
  <a href="ranking.html">ランキング</a>
  <a id="mypageLink" href="login.html">ログイン</a>
</div>

<script>

const SUPABASE_URL =
"https://fnhhthhaspogymniuust.supabase.co";

const SUPABASE_KEY =
"sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function loadRanking(){

  const top3Box =
    document.getElementById("top3Box");

  const rankingBox =
    document.getElementById("rankingBox");

  const { data:picks } =
    await supabaseClient
      .from("picks")
      .select("*");

  const { data:results } =
    await supabaseClient
      .from("results")
      .select("*");

  if(!picks || picks.length === 0){

    top3Box.innerHTML =
      `<div class="info-card">
        まだ予想がありません。
      </div>`;

    rankingBox.innerHTML = "";
    return;
  }

  const users = {};

  picks.forEach(pick => {

    const username =
      pick.username ||
      "名無しの予想家";

    if(!users[username]){
      users[username] = {
        username,
        total:0,
        hit:0
      };
    }

    users[username].total++;

    const matchedResult =
      results.find(result =>
        result.race === pick.race &&
        result.horse === pick.horse &&
        Number(result.result) === 1
      );

    if(matchedResult){
      users[username].hit++;
    }

  });

  const ranking =
    Object.values(users)
      .map(user => ({
        ...user,
        rate:
          user.total === 0
            ? 0
            : (user.hit / user.total) * 100
      }))
      .sort(
        (a,b) =>
          b.rate - a.rate ||
          b.hit - a.hit ||
          b.total - a.total
      );

  const top3 =
    ranking.slice(0,3);

  const classes =
    ["top1","top2","top3"];

  const medals =
    ["🥇","🥈","🥉"];

  top3Box.innerHTML =
    top3.map((user,index) => `

      <div class="top-card ${classes[index]}">

        <div class="medal">
          ${medals[index]}
        </div>

        <div class="rank-name">
          ${user.username}
        </div>

        <div class="rate">
          ${user.rate.toFixed(1)}%
        </div>

        <div class="rank-sub">
          的中 ${user.hit} ／ 投稿 ${user.total}
        </div>

      </div>

    `).join("");

  rankingBox.innerHTML =
    ranking.slice(3).map((user,index) => `

      <div class="normal-card">

        <div class="normal-rank">
          ${index + 4}位
        </div>

        <div class="normal-name">
          ${user.username}
        </div>

        <div class="normal-rate">
          ${user.rate.toFixed(1)}%
        </div>

        <div class="normal-sub">
          的中 ${user.hit}
          ／
          投稿 ${user.total}
        </div>

      </div>

    `).join("");

}

async function updateNav(){

  const { data } =
    await supabaseClient.auth.getUser();

  const link =
    document.getElementById("mypageLink");

  if(data.user){

    link.textContent =
      "マイページ";

    link.href =
      "mypage.html";

  }else{

    link.textContent =
      "ログイン";

    link.href =
      "login.html";

  }

}

loadRanking();
updateNav();

</script>

</body>
</html>
