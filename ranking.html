<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ランキング | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:#f4f4f4;color:#111}
.header{background:#fff;padding:16px;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:10}
.logo{text-align:center;font-size:24px;font-weight:900}
.copy{text-align:center;font-size:12px;color:#666;margin-top:4px}
.section{margin:18px 14px}
.section-title{font-size:20px;font-weight:900;margin-bottom:12px;border-left:5px solid #111;padding-left:10px}
.card{background:#fff;border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 5px 16px rgba(0,0,0,.05);border:1px solid #e5e5e5}
.rank{font-size:24px;font-weight:900}
.name{font-size:20px;font-weight:900;margin-top:8px}
.stats{font-size:13px;color:#666;line-height:1.7;margin-top:8px}
.badge{display:inline-block;background:#111;color:#fff;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:900;margin-top:10px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #ccc;display:grid;grid-template-columns:repeat(4,1fr);padding:9px 0}
.bottom-nav a{text-align:center;color:#111;text-decoration:none;font-size:12px;font-weight:800}
.space{height:80px}
</style>
</head>

<body>

<div class="header">
  <div class="logo">DARKHORSCORE</div>
  <div class="copy">予想家ランキング</div>
</div>

<div class="section">
  <div class="section-title">総合ランキング</div>
  <div id="rankingBox">
    <div class="card">ランキングを読み込み中...</div>
  </div>
</div>

<div class="section">
  <div class="section-title">DARKHORSCOREとは</div>

  <div class="card">
    予想の人気ではなく、実績で予想家を評価するランキングです。<br><br>
    現在は、投稿した本命馬がレース結果で1着だった場合に「的中」として集計しています。
  </div>
</div>

<div class="space"></div>

<div class="bottom-nav">
  <a href="index.html">ホーム</a>
  <a href="post.html">予想</a>
  <a href="ranking.html">ランキング</a>
  <a id="mypageLink" href="login.html">ログイン</a>
</div>

<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadRanking(){
  const rankingBox = document.getElementById("rankingBox");

  const { data: picks, error: picksError } = await supabaseClient
    .from("picks")
    .select("*");

  const { data: results, error: resultsError } = await supabaseClient
    .from("results")
    .select("*");

  if(picksError || resultsError){
    rankingBox.innerHTML = `<div class="card">ランキングの取得に失敗しました。</div>`;
    return;
  }

  if(!picks || picks.length === 0){
    rankingBox.innerHTML = `<div class="card">まだ予想がありません。</div>`;
    return;
  }

  const users = {};

  picks.forEach(pick => {
    const username = pick.username || "名無しの予想家";

    if(!users[username]){
      users[username] = {
        username: username,
        total: 0,
        hit: 0
      };
    }

    users[username].total++;

    const matchedResult = results.find(result =>
      result.race === pick.race &&
      result.horse === pick.horse &&
      Number(result.result) === 1
    );

    if(matchedResult){
      users[username].hit++;
    }
  });

  const ranking = Object.values(users)
    .map(user => {
      const rate = user.total === 0 ? 0 : (user.hit / user.total) * 100;
      return {
        ...user,
        rate: rate
      };
    })
    .sort((a,b) => b.rate - a.rate || b.hit - a.hit || b.total - a.total);

  rankingBox.innerHTML = ranking.map((user, index) => {
    const medal =
      index === 0 ? "🥇" :
      index === 1 ? "🥈" :
      index === 2 ? "🥉" : "🏇";

    const badge =
      user.total < 3 ? "集計中" :
      user.rate >= 50 ? "高的中率" :
      user.hit > 0 ? "的中あり" : "挑戦中";

    return `
      <div class="card">
        <div class="rank">${medal} ${index + 1}位</div>
        <div class="name">${user.username}</div>
        <div class="stats">
          的中率：${user.rate.toFixed(1)}%<br>
          的中数：${user.hit}<br>
          予想数：${user.total}
        </div>
        <span class="badge">${badge}</span>
      </div>
    `;
  }).join("");
}

async function updateNav(){
  const { data } = await supabaseClient.auth.getUser();
  const link = document.getElementById("mypageLink");

  if(data.user){
    link.textContent = "マイページ";
    link.href = "mypage.html";
  }else{
    link.textContent = "ログイン";
    link.href = "login.html";
  }
}

loadRanking();
updateNav();
</script>

</body>
</html>
