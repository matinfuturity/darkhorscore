<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結果登録 | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;color:#111}
.header{background:#111;color:white;padding:24px;text-align:center}
.logo{font-size:28px;font-weight:900}
.sub{font-size:13px;color:#ccc;margin-top:6px}
.container{padding:16px}
.card{background:white;border-radius:20px;padding:18px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
label{display:block;font-weight:900;margin-top:16px}
input,select,textarea{width:100%;box-sizing:border-box;padding:14px;border-radius:12px;border:1px solid #ddd;font-size:16px;margin-top:8px;background:white}
button{width:100%;margin-top:22px;padding:16px;border:none;border-radius:999px;background:#111;color:white;font-size:16px;font-weight:900}
.note{font-size:13px;color:#666;line-height:1.7;margin-top:14px}
</style>
</head>

<body>

<div class="header">
  <div class="logo">DARKHORSCORE</div>
  <div class="sub">運営用・レース結果登録</div>
</div>

<div class="container">
  <div class="card">

    <label>管理パスワード</label>
    <input id="adminPass" type="password" placeholder="管理用パスワード">

    <label>競馬場</label>
    <select id="racecourse">
      <option value="">競馬場を選択してください</option>
      <option value="札幌">札幌</option>
      <option value="函館">函館</option>
      <option value="福島">福島</option>
      <option value="新潟">新潟</option>
      <option value="東京">東京</option>
      <option value="中山">中山</option>
      <option value="中京">中京</option>
      <option value="京都">京都</option>
      <option value="阪神">阪神</option>
      <option value="小倉">小倉</option>
      <option value="大井">大井</option>
      <option value="川崎">川崎</option>
      <option value="船橋">船橋</option>
      <option value="浦和">浦和</option>
      <option value="名古屋">名古屋</option>
      <option value="笠松">笠松</option>
      <option value="園田">園田</option>
      <option value="高知">高知</option>
      <option value="佐賀">佐賀</option>
    </select>

    <label>レース名</label>
    <input id="race" placeholder="例：函館記念">

    <label>1着馬</label>
    <input id="horse" placeholder="例：ローシャムパーク">

    <button onclick="saveResult()">結果を登録する</button>

    <div class="note">
      ※現在は「1着馬＝的中対象」として登録します。<br>
      ※競馬場・レース名・馬名が予想と一致すると的中判定されます。
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PASSWORD = "darkhorse";

async function saveResult(){
  const pass = document.getElementById("adminPass").value;
  const racecourse = document.getElementById("racecourse").value;
  const race = document.getElementById("race").value.trim();
  const horse = document.getElementById("horse").value.trim();

  if(pass !== ADMIN_PASSWORD){
    alert("管理パスワードが違います。");
    return;
  }

  if(!racecourse){
    alert("競馬場を選択してください。");
    return;
  }

  if(!race){
    alert("レース名をご入力ください。");
    return;
  }

  if(!horse){
    alert("1着馬をご入力ください。");
    return;
  }

  const { error } = await supabaseClient
    .from("results")
    .insert({
      racecourse: racecourse,
      race: race,
      horse: horse,
      result: 1
    });

  if(error){
    alert(error.message);
    return;
  }

  alert("結果を登録しました。");

  document.getElementById("race").value = "";
  document.getElementById("horse").value = "";
}
</script>

</body>
</html>
