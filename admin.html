<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結果登録 | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;color:#111}
.header{background:#111;color:white;padding:24px;text-align:center}
.logo{font-size:28px;font-weight:900}
.sub{font-size:13px;color:#ccc;margin-top:6px}
.container{padding:16px}
.card{background:white;border-radius:20px;padding:18px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
label{display:block;font-weight:900;margin-top:16px}
input,select,textarea{width:100%;box-sizing:border-box;padding:14px;border-radius:12px;border:1px solid #ddd;font-size:16px;margin-top:8px;background:white}
button{width:100%;margin-top:22px;padding:16px;border:none;border-radius:999px;background:#111;color:white;font-size:16px;font-weight:900}
.note{font-size:13px;color:#666;line-height:1.7;margin-top:14px}
</style>
</head>

<body>

<div class="header">
  <div class="logo">DARKHORSCORE</div>
  <div class="sub">運営用・レース結果登録</div>
</div>

<div class="container">
  <div class="card">

    <label>管理パスワード</label>
    <input id="adminPass" type="password" placeholder="管理用パスワード">

    <label>対象レース</label>
    <select id="raceSelect">
      <option value="">レースを読み込み中...</option>
    </select>

    <label>1着馬</label>
    <input id="horse" placeholder="例：ローシャムパーク">

    <button onclick="saveResult()">結果を登録する</button>

    <div class="note">
      ※レースは登録済みの対象レースから選択します。<br>
      ※現在は「1着馬＝的中対象」として登録します。<br>
      ※race_idで紐付けるため、レース名の誤字による判定ミスを防げます。
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PASSWORD = "darkhorse";
let races = [];

async function loadRaces(){
  const select = document.getElementById("raceSelect");

  const { data, error } = await supabaseClient
    .from("races")
    .select("*")
    .order("deadline", { ascending:true });

  if(error){
    select.innerHTML = '<option value="">レース取得に失敗しました</option>';
    alert(error.message);
    return;
  }

  races = data || [];

  if(races.length === 0){
    select.innerHTML = '<option value="">対象レースがありません</option>';
    return;
  }

  select.innerHTML = '<option value="">レースを選択してください</option>';

  races.forEach(r => {
    const deadlineText = r.deadline
      ? " / 締切 " + new Date(r.deadline).toLocaleString("ja-JP")
      : "";

    select.innerHTML += `
      <option value="${r.id}">
        ${r.racecourse}｜${r.race}${deadlineText}
      </option>
    `;
  });
}

async function saveResult(){
  const pass = document.getElementById("adminPass").value;
  const raceId = document.getElementById("raceSelect").value;
  const horse = document.getElementById("horse").value.trim();

  if(pass !== ADMIN_PASSWORD){
    alert("管理パスワードが違います。");
    return;
  }

  if(!raceId){
    alert("対象レースを選択してください。");
    return;
  }

  if(!horse){
    alert("1着馬をご入力ください。");
    return;
  }

  const selectedRace = races.find(r =>
    String(r.id) === String(raceId)
  );

  if(!selectedRace){
    alert("対象レースの取得に失敗しました。");
    return;
  }

  const { error } = await supabaseClient
    .from("results")
    .insert({
      race_id: Number(selectedRace.id),
      racecourse: selectedRace.racecourse,
      race: selectedRace.race,
      horse: horse,
      result: 1
    });

  if(error){
    alert(error.message);
    return;
  }

  alert("結果を登録しました。");

  document.getElementById("horse").value = "";
  document.getElementById("raceSelect").value = "";
}

loadRaces();
</script>

</body>
</html>
