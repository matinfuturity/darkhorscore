<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿 | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;color:#111}
.header{background:#111;color:white;padding:20px;text-align:center}
.logo{font-size:28px;font-weight:900}
.sub{font-size:12px;color:#ccc;margin-top:5px}
.container{padding:15px}
.card{background:white;border-radius:20px;padding:18px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.login-user{font-size:14px;color:#666;margin-bottom:10px}
label{display:block;font-weight:900;margin-top:16px}
input,select,textarea{width:100%;box-sizing:border-box;padding:14px;border-radius:12px;border:1px solid #ddd;font-size:16px;margin-top:8px;background:white}
textarea{min-height:120px}
button{width:100%;margin-top:22px;padding:16px;border:none;border-radius:999px;background:#111;color:white;font-size:16px;font-weight:900}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #ddd;display:grid;grid-template-columns:repeat(4,1fr);padding:10px 0}
.bottom-nav a{text-align:center;text-decoration:none;color:#111;font-size:12px;font-weight:900}
.space{height:80px}
</style>
</head>

<body>

<div class="header">
  <div class="logo">DARKHORSCORE</div>
  <div class="sub">予想を投稿する</div>
</div>

<div class="container">
  <div class="card">
    <div class="login-user" id="loginUser">ログイン確認中...</div>

    <label>対象レース</label>
    <select id="raceSelect">
      <option value="">レースを読み込み中...</option>
    </select>

    <label>本命馬</label>
    <input id="horse" placeholder="例：ソールオリエンス">

    <label>予想理由</label>
    <textarea id="reason" placeholder="例：前走内容を評価。距離延長もプラス。"></textarea>

    <button onclick="submitPick()">投稿する</button>
  </div>
</div>

<div class="space"></div>

<div class="bottom-nav">
  <a href="index.html">ホーム</a>
  <a href="post.html">予想</a>
  <a href="ranking.html">ランキング</a>
  <a id="mypageLink" href="login.html">ログイン</a>
</div>

<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;
let races = [];

async function init(){
  const { data } = await supabaseClient.auth.getUser();
  currentUser = data.user;

  const navLink = document.getElementById("mypageLink");
  const loginUser = document.getElementById("loginUser");

  if(!currentUser){
    navLink.textContent = "ログイン";
    navLink.href = "login.html";
    loginUser.textContent = "予想を投稿するにはログインしてください。";
    await loadRaces();
    return;
  }

  navLink.textContent = "マイページ";
  navLink.href = "mypage.html";

  const { data: profile } = await supabaseClient
    .from("users")
    .select("*")
    .eq("email", currentUser.email)
    .single();

  currentProfile = profile;

  if(currentProfile && currentProfile.username){
    loginUser.textContent = "ログイン中：" + currentProfile.username;
  }else{
    loginUser.textContent = "ログイン中：" + currentUser.email;
  }

  await loadRaces();
}

async function loadRaces(){
  const select = document.getElementById("raceSelect");

  const { data, error } = await supabaseClient
    .from("races")
    .select("*")
    .order("id", { ascending:true });

  if(error){
    select.innerHTML = '<option value="">レースの取得に失敗しました</option>';
    return;
  }

  races = data || [];

  if(races.length === 0){
    select.innerHTML = '<option value="">対象レースがありません</option>';
    return;
  }

  select.innerHTML = '<option value="">レースを選択してください</option>';

  races.forEach(r => {
    select.innerHTML += `
      <option value="${r.id}">
        ${r.racecourse}｜${r.race}
      </option>
    `;
  });
}

async function submitPick(){
  if(!currentUser){
    alert("予想を投稿するにはログインが必要です。");
    location.href = "login.html";
    return;
  }

  const raceId = document.getElementById("raceSelect").value;
  const horse = document.getElementById("horse").value.trim();
  const reason = document.getElementById("reason").value.trim();

  if(!raceId){
    alert("対象レースを選択してください。");
    return;
  }

  if(!horse){
    alert("本命馬をご入力ください。");
    return;
  }

  const selectedRace = races.find(r => String(r.id) === String(raceId));

  if(!selectedRace){
    alert("対象レースの取得に失敗しました。");
    return;
  }

  const username =
    currentProfile?.username ||
    currentUser.email;

  const { error } = await supabaseClient
    .from("picks")
    .insert({
      user_id: currentUser.id,
      username: username,
      race_id: Number(raceId),
      racecourse: selectedRace.racecourse,
      race: selectedRace.race,
      horse: horse,
      reason: reason
    });

  if(error){
    alert(error.message);
    return;
  }

  alert("予想を投稿しました。");
  location.href = "index.html";
}

init();
</script>

</body>
</html>
