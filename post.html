
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票 | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#050505;
  --card:#121212;
  --line:#242424;
  --gold:#d4af37;
  --text:#fff;
  --sub:#999;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  padding-bottom:76px;
}
a{
  color:inherit;
  text-decoration:none;
}
.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  padding:26px 18px;
  background:
    radial-gradient(circle at top right, rgba(212,175,55,.16), transparent 38%),
    linear-gradient(180deg,#070707 0%,#050505 100%);
}
.header{
  padding:14px 0 26px;
}
.logo{
  font-size:24px;
  font-weight:950;
  letter-spacing:1.5px;
  color:var(--gold);
}
.catch{
  margin-top:10px;
  color:var(--sub);
  font-size:14px;
  line-height:1.7;
  font-weight:700;
}
.card{
  background:rgba(255,255,255,.045);
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px;
}
label{
  display:block;
  margin-top:18px;
  margin-bottom:9px;
  font-size:14px;
  font-weight:950;
}
.section-label{
  margin:0 0 12px;
  font-size:17px;
  font-weight:950;
}
.race-list{
  display:grid;
  gap:10px;
}
.race-card{
  background:#111;
  border:1px solid var(--line);
  border-radius:18px;
  padding:15px;
  cursor:pointer;
}
.race-card.selected{
  border-color:var(--gold);
  box-shadow:0 0 0 2px rgba(212,175,55,.18);
}
.race-title{
  font-size:16px;
  font-weight:950;
  line-height:1.4;
}
.race-deadline{
  color:var(--sub);
  font-size:12px;
  margin-top:7px;
  font-weight:800;
}
.selected-race{
  margin-top:12px;
  color:var(--gold);
  font-size:13px;
  font-weight:950;
}
input{
  width:100%;
  padding:15px;
  border-radius:15px;
  border:1px solid var(--line);
  background:#0b0b0b;
  color:#fff;
  font-size:16px;
}
input::placeholder{
  color:#777;
}
button{
  width:100%;
  margin-top:24px;
  padding:17px;
  border:none;
  border-radius:999px;
  background:var(--gold);
  color:#050505;
  font-size:17px;
  font-weight:950;
}
.reset-button{
  margin-top:12px;
  background:#222;
  color:#fff;
  border-radius:14px;
  box-shadow:none;
}
.notice{
  margin-top:16px;
  padding:14px;
  border-radius:16px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
  color:var(--sub);
  font-size:13px;
  line-height:1.7;
  font-weight:700;
}
.empty{
  color:var(--sub);
  font-size:14px;
  line-height:1.7;
}
.bottom-nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  background:rgba(5,5,5,.94);
  backdrop-filter:blur(14px);
  border-top:1px solid #222;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  padding:12px 0;
  z-index:999;
}
.bottom-nav a{
  text-align:center;
  color:#777;
  font-size:12px;
  font-weight:950;
}
.bottom-nav a:nth-child(2){
  color:var(--gold);
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">DARKHORSCORE</div>
    <div class="catch">
      どの馬を買う？<br>
      レースを選んで、馬名を投票。
    </div>
  </div>
  <div class="card">
    <div class="section-label">対象レース</div>
    <div id="raceList">
      <div class="empty">レースを読み込み中...</div>
    </div>
    <div id="selectedRaceText" class="selected-race">未選択</div>
    <label>投票する馬</label>
    <input id="horse" placeholder="例：ソールオリエンス">
    <button onclick="submitPick()">投票する</button>
    <div class="notice">
      投票すると、レースページの人気順に反映されます。
    </div>
  </div>
</div>
<div class="bottom-nav">
  <a href="index.html">ホーム</a>
  <a href="post.html">投票</a>
  <a href="legal.html">規約</a>
</div>
<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let races = [];
let selectedRaceId = "";
async function init(){
  await loadRaces();
}
async function loadRaces(){
  const box = document.getElementById("raceList");
  const { data, error } = await supabaseClient
    .from("races")
    .select("*")
    .order("deadline", { ascending:true });
  if(error){
    box.innerHTML = `<div class="empty">レースの取得に失敗しました。</div>`;
    return;
  }
  const now = new Date();
  races = (data || []).filter(r => {
    if(!r.deadline) return true;
    return new Date(r.deadline) >= now;
  });
  if(races.length === 0){
    box.innerHTML = `<div class="empty">対象レースがありません。</div>`;
    return;
  }
  renderRaces();
}
function renderRaces(){
  selectedRaceId = "";
  document.getElementById("selectedRaceText").textContent = "未選択";
  const box = document.getElementById("raceList");
  box.innerHTML = `
    <div class="race-list">
      ${races.map(r => {
        const deadlineText = r.deadline
          ? new Date(r.deadline).toLocaleString("ja-JP", {
              month:"numeric",
              day:"numeric",
              hour:"2-digit",
              minute:"2-digit"
            })
          : "未設定";
        return `
          <div class="race-card" onclick="selectRace('${r.id}')">
            <div class="race-title">${r.racecourse}｜${r.race}</div>
            <div class="race-deadline">締切 ${deadlineText}</div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}
function selectRace(id){
  selectedRaceId = String(id);
  const selectedRace = races.find(r => String(r.id) === selectedRaceId);
  if(!selectedRace) return;
  const deadlineText = selectedRace.deadline
    ? new Date(selectedRace.deadline).toLocaleString("ja-JP", {
        month:"numeric",
        day:"numeric",
        hour:"2-digit",
        minute:"2-digit"
      })
    : "未設定";
  document.getElementById("selectedRaceText").textContent =
    "選択中：" + selectedRace.racecourse + "｜" + selectedRace.race;
  document.getElementById("raceList").innerHTML = `
    <div class="race-list">
      <div class="race-card selected">
        <div class="race-title">${selectedRace.racecourse}｜${selectedRace.race}</div>
        <div class="race-deadline">締切 ${deadlineText}</div>
      </div>
      <button type="button" class="reset-button" onclick="renderRaces()">
        レースを選び直す
      </button>
    </div>
  `;
}
async function submitPick(){
  const horse = document.getElementById("horse").value.trim();
  if(!selectedRaceId){
    alert("対象レースを選択してください。");
    return;
  }
  if(!horse){
    alert("馬名を入力してください。");
    return;
  }
  const selectedRace = races.find(r => String(r.id) === String(selectedRaceId));
  if(!selectedRace){
    alert("対象レースの取得に失敗しました。");
    return;
  }
  const { error } = await supabaseClient
    .from("picks")
    .insert({
      race_id: selectedRace.id,
      racecourse: selectedRace.racecourse,
      race: selectedRace.race,
      horse: horse
    });
  if(error){
    alert(error.message);
    return;
  }
  alert("投票しました。");
  location.href = "race.html?racecourse=" 
    + encodeURIComponent(selectedRace.racecourse)
    + "&race="
    + encodeURIComponent(selectedRace.race);
}
init();
</script>
</body>
</html>
