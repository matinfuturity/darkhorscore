<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予想投稿 | DARKHORSCORE</title>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:#f6f6f6;
  color:#111;
  padding:24px;
}
a{
  color:#111;
  font-weight:800;
  text-decoration:none;
}
.logo{
  font-size:30px;
  font-weight:900;
  margin-top:28px;
}
.copy{
  margin-top:10px;
  color:#555;
}
.card{
  background:white;
  border-radius:24px;
  padding:22px;
  margin-top:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
  border:1px solid #eee;
}
label{
  display:block;
  margin-top:18px;
  margin-bottom:8px;
  font-weight:800;
}
input,textarea,select{
  width:100%;
  box-sizing:border-box;
  padding:15px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:16px;
  background:#fff;
}
textarea{
  min-height:130px;
}
button{
  width:100%;
  margin-top:24px;
  padding:16px;
  border:none;
  border-radius:999px;
  background:#111;
  color:white;
  font-size:16px;
  font-weight:900;
}
.note{
  color:#777;
  font-size:13px;
  line-height:1.7;
  margin-top:16px;
}
</style>
</head>

<body>

<a href="index.html">← トップへ戻る</a>

<div class="logo">DARKHORSCORE</div>
<div class="copy">予想ではなく、実績で語れ。</div>

<div class="card">
  <h1>🏇 予想を投稿する</h1>

  <label>レース名</label>
  <select>
    <option>宝塚記念</option>
    <option>スプリンターズステークス</option>
    <option>秋華賞</option>
    <option>菊花賞</option>
    <option>天皇賞・秋</option>
    <option>ジャパンカップ</option>
    <option>有馬記念</option>
  </select>

  <label>本命馬</label>
  <input type="text" placeholder="例：ドウデュース">

  <label>予想理由</label>
  <textarea placeholder="例：前走内容が良く、距離適性も高いと感じたため。"></textarea>

  <button>投稿する</button>

  <p class="note">
    ※ 現在はデザイン確認用です。正式版では投稿後に予想が記録され、的中率やランキングに反映されます。
  </p>
</div>

</body>
</html>
