<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿 | DARKHORSCORE</title>
<style>
body{margin:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;color:#111}
.header{background:#111;color:white;padding:20px;text-align:center}
.logo{font-size:28px;font-weight:900}
.sub{font-size:12px;color:#ccc;margin-top:5px}
.container{padding:15px}
.card{background:white;border-radius:20px;padding:18px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
label{display:block;font-weight:900;margin-top:16px}
input,textarea{width:100%;box-sizing:border-box;padding:14px;border-radius:12px;border:1px solid #ddd;font-size:16px;margin-top:8px}
textarea{min-height:120px}
button{width:100%;margin-top:22px;padding:16px;border:none;border-radius:999px;background:#111;color:white;font-size:16px;font-weight:900}
.nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #ddd;display:grid;grid-template-columns:repeat(4,1fr);padding:10px 0}
.nav a{text-align:center;text-decoration:none;color:#111;font-size:12px;font-weight:900}
.space{height:80px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">DARKHORSCORE</div>
  <div class="sub">予想を投稿する</div>
</div>

<div class="container">
  <div class="card">
    <label>ユーザー名</label>
    <input id="user" placeholder="例：ようよう">

    <label>レース名</label>
    <input id="race" placeholder="例：函館記念">

    <label>本命馬</label>
    <input id="horse" placeholder="例：ソールオリエンス">

    <label>予想理由</label>
    <textarea id="reason" placeholder="例：前走内容を評価。距離延長もプラス。"></textarea>

    <button onclick="submitPick()">投稿する</button>
  </div>
</div>

<div class="space"></div>

<div class="nav">
  <a href="index.html">ホーム</a>
  <a href="post.html">投稿</a>
  <a href="ranking.html">順位</a>
  <a href="mypage.html">マイページ</a>
</div>

<script>
function submitPick(){
  const user = document.getElementById("user").value.trim() || "匿名ユーザー";
  const race = document.getElementById("race").value.trim();
  const horse = document.getElementById("horse").value.trim();
  const reason = document.getElementById("reason").value.trim();

  if(!race || !horse){
    alert("レース名と本命馬を入力して！");
    return;
  }

  const picks = JSON.parse(localStorage.getItem("picks") || "[]");

  picks.unshift({
    user,
    race,
    horse,
    reason,
    rate:"未集計",
    date:new Date().toLocaleString("ja-JP")
  });

  localStorage.setItem("picks", JSON.stringify(picks));

  alert("投稿した！");
  location.href = "index.html";
}
</script>

</body>
</html>
