<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;color:#111}
.header{background:#111;color:white;padding:24px;text-align:center}
.logo{font-size:28px;font-weight:900}
.sub{font-size:13px;color:#ccc;margin-top:6px}
.container{padding:16px}
.card{background:white;border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.name{font-size:28px;font-weight:900}
.info{font-size:14px;color:#666;margin-top:8px}
.title{font-size:20px;font-weight:900;margin:24px 0 12px}
.pick{font-size:22px;font-weight:900;margin-top:8px}
.reason{color:#555;margin-top:8px;line-height:1.6}
button{width:100%;padding:14px;border:none;border-radius:999px;background:#111;color:white;font-weight:900;font-size:15px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #ddd;display:grid;grid-template-columns:repeat(4,1fr);padding:10px 0}
.bottom-nav a{text-align:center;text-decoration:none;color:#111;font-size:12px;font-weight:900}
.space{height:80px}
</style>
</head>

<body>

<div class="header">
  <div class="logo">DARKHORSCORE</div>
  <div class="sub">マイページ</div>
</div>

<div class="container">

  <div class="card">
    <div class="name" id="username">読み込み中...</div>
    <div class="info">好きな馬：未設定</div>
    <div class="info" id="postCount">投稿数：0件</div>
  </div>

  <div class="title">最近の予想</div>
  <div id="myPicks"></div>

  <button onclick="logout()">ログアウト</button>

</div>

<div class="space"></div>

<div class="bottom-nav">
  <a href="index.html">ホーム</a>
  <a href="post.html">予想</a>
  <a href="ranking.html">ランキング</a>
  <a href="mypage.html">マイページ</a>
</div>

<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function init(){
  const { data } = await supabaseClient.auth.getUser();
  const user = data.user;

  if(!user){
    location.href = "login.html";
    return;
  }

  const { data: profile } = await supabaseClient
    .from("users")
    .select("*")
    .eq("id", user.id)
    .single();

  const username = profile?.username || user.email;

  document.getElementById("username").textContent = username;

  const { data: picks, error } = await supabaseClient
    .from("picks")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending:false });

  if(error){
    document.getElementById("myPicks").innerHTML =
      `<div class="card">予想の取得に失敗しました。</div>`;
    return;
  }

  document.getElementById("postCount").textContent =
    "投稿数：" + picks.length + "件";

  if(picks.length === 0){
    document.getElementById("myPicks").innerHTML =
      `<div class="card">まだ予想がありません。</div>`;
    return;
  }

  document.getElementById("myPicks").innerHTML = picks.map(p => `
    <div class="card">
      <div class="info">${p.race}</div>
      <div class="pick">◎ ${p.horse}</div>
      <div class="reason">${p.reason || "理由なし"}</div>
    </div>
  `).join("");
}

async function logout(){
  await supabaseClient.auth.signOut();
  alert("ログアウトしました。");
  location.href = "index.html";
}

init();
</script>

</body>
</html>
