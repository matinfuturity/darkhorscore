<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --green:#1e7f4f;
  --brown:#8b5a2b;
  --gold:#d4af37;
  --cream:#f7f3ea;
  --card:#ffffff;
  --line:#e4dccf;
  --text:#171717;
  --sub:#777;
  --red:#b84432;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--cream);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  padding-bottom:80px;
}

.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  background:linear-gradient(180deg,#fbf8f1 0%,#f7f3ea 48%,#f1eadf 100%);
}

.header{
  padding:30px 18px 24px;
  text-align:center;
  color:white;
  background:linear-gradient(135deg,var(--green),#2f9b64 45%,var(--brown));
}

.logo{
  font-size:28px;
  font-weight:950;
  letter-spacing:.5px;
}

.sub{
  color:rgba(255,255,255,.86);
  margin-top:7px;
  font-weight:800;
  font-size:13px;
}

.container{
  padding:18px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:24px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:0 8px 22px rgba(50,35,15,.08);
}

.display-name{
  font-size:28px;
  font-weight:950;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.favorite{
  color:var(--sub);
  margin-top:10px;
  font-size:14px;
  font-weight:700;
}

.main-rate{
  font-size:58px;
  color:var(--green);
  font-weight:950;
  margin-top:22px;
  line-height:1;
}

.rate-label{
  color:var(--sub);
  font-size:13px;
  font-weight:800;
  margin-top:6px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:22px;
}

.stat{
  background:#f7f3ea;
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px 8px;
  text-align:center;
}

.stat strong{
  color:var(--green);
  display:block;
  font-size:25px;
}

.stat span{
  color:var(--sub);
  font-size:12px;
  font-weight:800;
}

h2{
  margin:0 0 16px;
  font-size:22px;
}

label{
  display:block;
  font-weight:900;
  margin-top:16px;
}

input{
  width:100%;
  box-sizing:border-box;
  margin-top:8px;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#fbfaf7;
  color:var(--text);
  font-size:16px;
}

button{
  width:100%;
  margin-top:18px;
  padding:15px;
  border:none;
  border-radius:999px;
  background:var(--green);
  color:white;
  font-size:16px;
  font-weight:950;
  box-shadow:0 8px 18px rgba(30,127,79,.22);
}

.logout{
  background:#eee6da;
  color:#111;
  box-shadow:none;
  margin-top:10px;
}

.section-title{
  font-size:20px;
  font-weight:950;
  margin:24px 0 12px;
}

.pick-card{
  background:white;
  border:1px solid var(--line);
  border-left:5px solid var(--green);
  border-radius:20px;
  padding:15px;
  margin-bottom:12px;
  box-shadow:0 6px 16px rgba(50,35,15,.06);
}

.pick-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.pick-race{
  color:var(--sub);
  font-size:13px;
  margin-top:8px;
  font-weight:800;
}

.pick-horse{
  font-size:22px;
  font-weight:950;
  margin-top:8px;
}

.pick-reason{
  color:#555;
  font-size:13px;
  line-height:1.6;
  margin-top:8px;
}

.badge{
  padding:5px 9px;
  border-radius:999px;
  font-size:11px;
  font-weight:950;
  color:white;
}

.hit{background:var(--green)}
.miss{background:var(--red)}
.wait{background:#8a6818}

.empty{
  color:var(--sub);
  background:white;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  font-weight:800;
}

.error{
  color:#b00020;
  background:#fff0f2;
  border:1px solid #ffd0d8;
  padding:12px;
  border-radius:14px;
  margin-bottom:12px;
  display:none;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  background:rgba(255,255,255,.96);
  border-top:1px solid #ddd3c3;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  padding:11px 0;
}

.bottom-nav a{
  text-align:center;
  color:#888;
  text-decoration:none;
  font-size:12px;
  font-weight:950;
}

.bottom-nav a:last-child{
  color:var(--green);
}
</style>
</head>

<body>

<div class="app">
  <div class="header">
    <div class="logo">DARKHORSCORE</div>
    <div class="sub">マイページ</div>
  </div>

  <div class="container">
    <div id="errorBox" class="error"></div>

    <div class="card">
      <div id="displayName" class="display-name">読み込み中...</div>
      <div class="favorite">好きな馬：<span id="favoriteText">未設定</span></div>

      <div class="main-rate" id="hitRate">0.0%</div>
      <div class="rate-label">単勝的中率</div>

      <div class="stats">
        <div class="stat"><strong id="hitCount">0</strong><span>的中数</span></div>
        <div class="stat"><strong id="postCount">0</strong><span>投稿数</span></div>
      </div>
    </div>

    <div class="card">
      <h2>プロフィール編集</h2>

      <label>表示名</label>
      <input id="usernameInput" placeholder="例：ようよう">

      <label>好きな馬</label>
      <input id="favoriteInput" placeholder="例：ソールオリエンス">

      <button onclick="saveProfile()">保存する</button>
      <button class="logout" onclick="logout()">ログアウト</button>
    </div>

    <div class="section-title">あなたの予想</div>
    <div id="myPicks"></div>
  </div>
</div>

<div class="bottom-nav">
  <a href="index.html">ホーム</a>
  <a href="post.html">予想</a>
  <a href="mypage.html">マイページ</a>
</div>

<script>
const SUPABASE_URL = "https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY = "sb_publishable_rYelZ1w934DIkm_1kXJQYw_3dEwb3Ns";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let currentProfile = null;
let allPicks = [];
let allResults = [];
let myPicks = [];
function showError(message){
  const box = document.getElementById("errorBox");
  box.textContent = message;
  box.style.display = "block";
}
function getStatus(p){
  const sameRaceResults = allResults.filter(r => {
    if(p.race_id && r.race_id){
      return Number(r.race_id) === Number(p.race_id);
    }
    return r.racecourse === p.racecourse && r.race === p.race;
  });
  if(sameRaceResults.length === 0){
    return { text:"集計待ち", cls:"wait" };
  }
  const hit = sameRaceResults.find(r =>
    r.horse === p.horse && Number(r.result) === 1
  );
  return hit ? { text:"的中", cls:"hit" } : { text:"不的中", cls:"miss" };
}
async function init(){
  const { data, error } = await supabaseClient.auth.getSession();
  if(error){
    showError("ログイン情報の取得に失敗しました。");
    return;
  }
  if(!data.session || !data.session.user){
    location.href = "login.html";
    return;
  }
  currentUser = data.session.user;
  await loadProfile();
  await loadStatsAndPicks();
}
async function loadProfile(){
  let profile = null;
  const byId = await supabaseClient
    .from("users")
    .select("*")
    .eq("id", currentUser.id)
    .maybeSingle();
  if(byId.data){
    profile = byId.data;
  }else{
    const byEmail = await supabaseClient
      .from("users")
      .select("*")
      .eq("email", currentUser.email)
      .maybeSingle();
    profile = byEmail.data;
  }
  if(!profile){
    currentProfile = null;
    document.getElementById("displayName").textContent = "名無しの予想家";
    document.getElementById("favoriteText").textContent = "未設定";
    document.getElementById("usernameInput").value = "";
    document.getElementById("favoriteInput").value = "";
    return;
  }
  currentProfile = profile;
  document.getElementById("displayName").textContent =
    profile.username || "名無しの予想家";
  document.getElementById("favoriteText").textContent =
    profile.favorite_horse || "未設定";
  document.getElementById("usernameInput").value =
    profile.username || "";
  document.getElementById("favoriteInput").value =
    profile.favorite_horse || "";
}
async function loadStatsAndPicks(){
  const pickRes = await supabaseClient
    .from("picks")
    .select("*")
    .order("created_at", { ascending:false });
  const resultRes = await supabaseClient
    .from("results")
    .select("*");
  allPicks = pickRes.data || [];
  allResults = resultRes.data || [];
  const myName = currentProfile?.username || "";
  myPicks = allPicks.filter(p => {
    if(p.user_id && currentUser.id){
      return p.user_id === currentUser.id;
    }
    if(myName){
      return p.username === myName;
    }
    return false;
  });
  const judgedPicks = myPicks.filter(p =>
    getStatus(p).text !== "集計待ち"
  );
  const hitCount = judgedPicks.filter(p =>
    getStatus(p).text === "的中"
  ).length;
  const total = judgedPicks.length;
  const rate = total ? (hitCount / total) * 100 : 0;
  document.getElementById("hitRate").textContent = rate.toFixed(1) + "%";
  document.getElementById("hitCount").textContent = hitCount;
  document.getElementById("postCount").textContent = myPicks.length;
  renderMyPicks();
}
function renderMyPicks(){
  const box = document.getElementById("myPicks");
  if(myPicks.length === 0){
    box.innerHTML = `<div class="empty">まだ予想がありません。</div>`;
    return;
  }
  box.innerHTML = myPicks.map(p => {
    const status = getStatus(p);
    return `
      <div class="pick-card">
        <div class="pick-top">
          <strong>${p.username || "名無しの予想家"}</strong>
          <span class="badge ${status.cls}">${status.text}</span>
        </div>
        <div class="pick-race">${p.racecourse || ""} ${p.race || ""}</div>
        <div class="pick-horse">◎ ${p.horse || ""}</div>
        <div class="pick-reason">${p.reason || "理由なし"}</div>
      </div>
    `;
  }).join("");
}
async function saveProfile(){
  const username = document.getElementById("usernameInput").value.trim();
  const favoriteHorse = document.getElementById("favoriteInput").value.trim();
  if(!username){
    alert("表示名をご入力ください。");
    return;
  }
  const payload = {
    id: currentUser.id,
    email: currentUser.email,
    username: username,
    favorite_horse: favoriteHorse
  };
  const { error } = await supabaseClient
    .from("users")
    .upsert(payload, { onConflict:'email' });
  if(error){
    showError(error.message);
    return;
  }
  await supabaseClient
    .from("picks")
    .update({ username: username })
    .eq("user_id", currentUser.id);
  alert("保存しました。");
  await loadProfile();
  await loadStatsAndPicks();
}
async function logout(){
  await supabaseClient.auth.signOut();
  location.href = "login.html";
}
init();
</script>
