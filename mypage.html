<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ | DARKHORSCORE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --gold:#d4af37;
  --green:#1e7f4f;
  --red:#b84432;
}
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}
.header{
  background:linear-gradient(180deg,#050505,#151515);
  padding:24px;
  text-align:center;
  border-bottom:1px solid rgba(212,175,55,.25);
}
.logo{
  font-size:30px;
  font-weight:900;
}
.sub{
  color:var(--gold);
  margin-top:6px;
}
.container{
  padding:16px;
}
.hero-card{
  background:linear-gradient(180deg,#1b1b1b,#111);
  border-radius:24px;
  padding:24px;
  border:1px solid rgba(255,255,255,.08);
  margin-bottom:16px;
}
.name{
  font-size:32px;
  font-weight:900;
}
.favorite{
  color:#bbb;
  margin-top:8px;
}
.rate{
  font-size:64px;
  font-weight:900;
  color:var(--gold);
  margin-top:18px;
}
.rate-label{
  color:#aaa;
  font-size:13px;
}
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:20px;
}
.stat{
  background:#070707;
  border-radius:16px;
  padding:12px;
  text-align:center;
}
.stat-num{
  font-size:24px;
  font-weight:900;
  color:var(--gold);
}
.stat-label{
  color:#aaa;
  font-size:12px;
}
.card{
  background:linear-gradient(180deg,#1b1b1b,#111);
  border-radius:22px;
  padding:18px;
  border:1px solid rgba(255,255,255,.08);
  margin-bottom:14px;
}
.title{
  font-size:22px;
  font-weight:900;
  margin-bottom:12px;
}
label{
  display:block;
  font-weight:900;
  margin-top:14px;
}
input{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.1);
  background:#070707;
  color:white;
  margin-top:8px;
}
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#f4d36b,#b58a22);
  color:#111;
  font-weight:900;
  font-size:16px;
  margin-top:14px;
}
.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  margin-bottom:10px;
}
.hit{
  background:var(--green);
}
.miss{
  background:var(--red);
}
.wait{
  background:#8a6818;
}
.pick-card{
  background:linear-gradient(180deg,#1b1b1b,#111);
  border-left:5px solid var(--gold);
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
}
.pick-race{
  color:#aaa;
  font-size:13px;
}
.pick-horse{
  font-size:24px;
  font-weight:900;
  margin-top:8px;
}
.pick-reason{
  color:#bbb;
  margin-top:8px;
  line-height:1.6;
}
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#070707;
  border-top:1px solid rgba(212,175,55,.25);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  padding:10px 0;
}
.bottom-nav a{
  text-align:center;
  text-decoration:none;
  color:#ddd;
  font-size:12px;
  font-weight:900;
}
.bottom-nav a:nth-child(4){
  color:var(--gold);
}
.space{
  height:90px;
}
</style>
</head>
<body>
<div class="header">
  <div class="logo">DARKHORSCORE</div>
  <div class="sub">マイページ</div>
</div>
<div class="container">
<div class="hero-card">
<div class="name" id="displayName">
読み込み中...
</div>
<div class="favorite" id="favoriteText">
好きな馬：未設定
</div>
<div class="rate" id="hitRate">
-
</div>
<div class="rate-label">
的中率
</div>
<div class="stats">
<div class="stat">
<div class="stat-num" id="hitCount">0</div>
<div class="stat-label">的中数</div>
</div>
<div class="stat">
<div class="stat-num" id="postCount">0</div>
<div class="stat-label">投稿数</div>
</div>
<div class="stat">
<div class="stat-num" id="rankNumber">-</div>
<div class="stat-label">順位</div>
</div>
</div>
</div>
<div class="card">
<div class="title">
プロフィール編集
</div>

表示名
好きな馬
<button onclick="saveProfile()">
保存する
</button>
</div>
<div class="title">
最近の予想
</div>
<div id="myPicks"></div>
<button onclick="logout()">
ログアウト
</button>
</div>
<div class="space"></div>
<div class="bottom-nav">
<a href="index.html">ホーム</a>
<a href="post.html">予想</a>
<a href="ranking.html">ランキング</a>
<a href="mypage.html">マイページ</a>
</div>
<script>
const SUPABASE_URL="https://fnhhthhaspogymniuust.supabase.co";
const SUPABASE_KEY="YOUR_KEY";
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let currentUser=null;
let currentProfile=null;

async function init(){

const { data } =
await supabaseClient.auth.getUser();

currentUser = data.user;

if(!currentUser){
location.href = “login.html”;
return;
}

await loadProfile();
await loadStats();
await loadMyPicks();

}

async function loadProfile(){

const { data:profile } =
await supabaseClient
.from(“users”)
.select(”*”)
.eq(“email”, currentUser.email)
.single();

currentProfile = profile;

const username =
profile?.username ||
currentUser.email;

document.getElementById(“displayName”)
.textContent = username;

document.getElementById(“favoriteText”)
.textContent =
“好きな馬：” +
(profile?.favorite_horse || “未設定”);

document.getElementById(“usernameInput”)
.value = profile?.username || “”;

document.getElementById(“favoriteInput”)
.value = profile?.favorite_horse || “”;

}

async function loadStats(){

const { data:picks } =
await supabaseClient
.from(“picks”)
.select(”*”);

const { data:results } =
await supabaseClient
.from(“results”)
.select(”*”);

const users = {};

picks.forEach(pick => {

const username =
  pick.username ||
  "名無しの予想家";
if(!users[username]){
  users[username] = {
    username,
    total:0,
    hit:0
  };
}
users[username].total++;
const hit =
  results.find(result =>
    result.race === pick.race &&
    result.horse === pick.horse &&
    Number(result.result) === 1
  );
if(hit){
  users[username].hit++;
}

});

const ranking =
Object.values(users)
.filter(user => user.total >= 5)
.map(user => ({
…user,
rate:
user.total === 0
? 0
: (user.hit / user.total) * 100
}))
.sort(
(a,b)=>
b.rate - a.rate ||
b.hit - a.hit ||
b.total - a.total
);

const myName =
currentProfile?.username ||
currentUser.email;

const me =
ranking.find(
u => u.username === myName
);

const myRank =
ranking.findIndex(
u => u.username === myName
);

if(!me){

document.getElementById("hitRate")
  .textContent = "-";
document.getElementById("rankNumber")
  .textContent = "集計中";
return;

}

document.getElementById(“hitRate”)
.textContent =
me.rate.toFixed(1) + “%”;

document.getElementById(“hitCount”)
.textContent =
me.hit;

document.getElementById(“postCount”)
.textContent =
me.total;

let rankText =
“#” + (myRank + 1);

if(myRank === 0){
rankText = “🥇”;
}
else if(myRank === 1){
rankText = “🥈”;
}
else if(myRank === 2){
rankText = “🥉”;
}

document.getElementById(“rankNumber”)
.textContent = rankText;

}

async function loadMyPicks(){

const box =
document.getElementById(“myPicks”);

const { data:picks } =
await supabaseClient
.from(“picks”)
.select(”*”)
.eq(“user_id”, currentUser.id)
.order(“created_at”,{ascending:false});

const { data:results } =
await supabaseClient
.from(“results”)
.select(”*”);

if(!picks || picks.length === 0){

box.innerHTML =
  `<div class="card">
    まだ予想がありません。
  </div>`;
return;

}

box.innerHTML =
picks.map(p => {

  const hit =
    results.find(r =>
      r.race === p.race &&
      r.horse === p.horse &&
      Number(r.result) === 1
    );
  const raceResult =
    results.find(r =>
      r.race === p.race
    );
  let badge =
    `<span class="badge wait">
      集計待ち
    </span>`;
  if(raceResult){
    badge = hit
    ?
    `<span class="badge hit">
      的中
    </span>`
    :
    `<span class="badge miss">
      不的中
    </span>`;
  }
  return `
    <div class="pick-card">
      ${badge}
      <div class="pick-race">
        ${p.racecourse || ""}
        ${p.race || ""}
      </div>
      <div class="pick-horse">
        ◎ ${p.horse}
      </div>
      <div class="pick-reason">
        ${p.reason || "理由なし"}
      </div>
    </div>
  `;
}).join("");

}

async function saveProfile(){

const username =
document.getElementById(“usernameInput”)
.value.trim();

const favoriteHorse =
document.getElementById(“favoriteInput”)
.value.trim();

if(!username){
alert(“表示名をご入力ください。”);
return;
}

await supabaseClient
.from(“users”)
.update({
username,
favorite_horse:favoriteHorse
})
.eq(“email”, currentUser.email);

await supabaseClient
.from(“picks”)
.update({ username })
.eq(“user_id”, currentUser.id);

alert(“保存しました。”);

await loadProfile();
await loadStats();
await loadMyPicks();

}

async function logout(){

await supabaseClient.auth.signOut();

location.href =
“index.html”;

}

init();

</script>
</body>
</html>
