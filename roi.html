<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回収率計算機 | DARKHORSCORE</title>

<style>
:root{--gold:#d4af37;--green:#1e7f4f;--red:#b84432}

body{
  margin:0;
  background:#f5f5f5;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  color:#111;
}

.header{
  background:#111;
  color:white;
  padding:20px;
  text-align:center;
}

.logo{
  font-size:28px;
  font-weight:900;
}

.sub{
  color:var(--gold);
  margin-top:4px;
  font-size:13px;
}

.container{
  padding:16px;
}

.card{
  background:white;
  border-radius:18px;
  padding:18px;
  border:1px solid #e8e8e8;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

label{
  display:block;
  font-weight:900;
  margin-top:14px;
}

input{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:6px;
  font-size:16px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:999px;
  background:var(--gold);
  color:#111;
  font-weight:900;
  margin-top:18px;
  font-size:16px;
}

.reset{
  background:#eee;
  color:#111;
  margin-top:10px;
}

.result{
  text-align:center;
  margin-top:24px;
}

.rate{
  font-size:56px;
  font-weight:900;
  color:var(--gold);
}

.status{
  margin-top:8px;
  font-size:20px;
  font-weight:900;
}

.profit{
  margin-top:14px;
  font-size:28px;
  font-weight:900;
}

.unit{
  margin-top:8px;
  color:#666;
  font-size:14px;
}

.win{color:var(--green)}
.lose{color:var(--red)}
.neutral{color:#777}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  border-top:1px solid #ddd;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  padding:10px 0;
}

.bottom-nav a{
  text-align:center;
  text-decoration:none;
  color:#666;
  font-size:12px;
  font-weight:900;
}

.space{height:90px}
</style>
</head>

<body>

<div class="header">
  <div class="logo">DARKHORSCORE</div>
  <div class="sub">回収率計算機</div>
</div>

<div class="container">
  <div class="card">

    <label>購入金額（円）</label>
    <input type="number" id="bet" placeholder="例：1000">

    <label>払戻金額（円）</label>
    <input type="number" id="payout" placeholder="例：1500">

    <button onclick="calcROI()">回収率を計算</button>
    <button class="reset" onclick="resetCalc()">リセット</button>

    <div class="result">
      <div class="rate" id="rate">-</div>
      <div class="status" id="status"></div>
      <div class="profit" id="profit"></div>
      <div class="unit" id="unit"></div>
    </div>

  </div>
</div>

<div class="space"></div>

<div class="bottom-nav">
  <a href="index.html">ホーム</a>
  <a href="post.html">予想</a>
  <a href="ranking.html">ランキング</a>
  <a href="mypage.html">マイページ</a>
</div>

<script>
function calcROI(){
  const bet = Number(document.getElementById("bet").value);
  const payout = Number(document.getElementById("payout").value);

  if(!bet || bet <= 0){
    alert("購入金額を入力してください。");
    return;
  }

  const roi = (payout / bet) * 100;
  const profit = payout - bet;
  const per100 = payout / bet * 100;

  document.getElementById("rate").textContent = roi.toFixed(1) + "%";

  const status = document.getElementById("status");
  const profitBox = document.getElementById("profit");
  const unit = document.getElementById("unit");

  if(roi >= 150){
    status.textContent = "神回収 🎉";
    status.className = "status win";
  }else if(roi >= 120){
    status.textContent = "優秀な回収率";
    status.className = "status win";
  }else if(roi >= 100){
    status.textContent = "プラス収支";
    status.className = "status win";
  }else if(roi >= 80){
    status.textContent = "惜しい";
    status.className = "status neutral";
  }else{
    status.textContent = "マイナス収支";
    status.className = "status lose";
  }

  if(profit >= 0){
    profitBox.textContent = "利益 +" + profit.toLocaleString() + "円";
    profitBox.className = "profit win";
  }else{
    profitBox.textContent = "損失 " + profit.toLocaleString() + "円";
    profitBox.className = "profit lose";
  }

  unit.textContent = "100円あたり " + per100.toFixed(0) + "円 回収";
}

function resetCalc(){
  document.getElementById("bet").value = "";
  document.getElementById("payout").value = "";
  document.getElementById("rate").textContent = "-";
  document.getElementById("status").textContent = "";
  document.getElementById("profit").textContent = "";
  document.getElementById("unit").textContent = "";
}
</script>

</body>
</html>
